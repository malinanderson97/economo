document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-display: swap;\n  src: url(\"3db98c61-bda6-47da-b6aa-6405d25b9123\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"063999bb-a3a5-4740-a1e6-b875c4c67bc0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n\n  * { box-sizing: border-box; }\n  html, body { height: 100dvh; }\n  :root {\n    --chart-h: clamp(120px, 18dvh, 200px);\n    /* ink / text — Stripe navy + slate */\n    --ink:#0A2540; --ink-2:#425466; --ink-3:#697386; --ink-4:#8792A2;\n    /* structural navy */\n    --navy-900:#0A2540; --navy-800:#0A2540; --navy-700:#1A2E4A;\n    /* surfaces & rules */\n    --bg:#F6F9FC; --surface:#FFFFFF; --surface-2:#F7FAFC; --surface-tint:#EEF2F8;\n    --rule:#E3E8EE; --rule-2:#D5DBE3; --rule-strong:#AEB7C4;\n    /* accent — Stripe blurple */\n    --accent:#635BFF; --accent-hover:#5851EC; --accent-active:#4F46E5;\n    --accent-tint:#EFEEFE; --accent-tint-2:#DEDBFB; --accent-ring:rgba(99,91,255,.30);\n    /* curve hues — Stripe spectrum */\n    --curve-is:#E25950; --curve-mp:#635BFF; --curve-uip:#0FA9A0;\n    --curve-eps:#F5A623; --curve-pc:#E0408E;\n    --shadow-card:0 1px 1px rgba(0,0,0,.03), 0 3px 6px rgba(60,66,87,.06), 0 2px 4px rgba(60,66,87,.05);\n    --shadow-thumb:0 1px 2px rgba(60,66,87,.25), 0 0 0 1px rgba(60,66,87,.06);\n    --shadow-pop:0 15px 35px rgba(60,66,87,.12), 0 5px 15px rgba(0,0,0,.06);\n    --grad:#11B8C9;\n  }\n  body {\n    font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;\n    margin: 0; padding: 14px 14px 8px; background: var(--bg); color: var(--ink); font-size: 13px;\n    display: flex; flex-direction: column; overflow: hidden; height: 100dvh; -webkit-font-smoothing: antialiased;\n  }\n  /* ── Header → navy institutional band ── */\n  .header {\n    position: relative;\n    display: flex; justify-content: space-between; align-items: center;\n    flex-wrap: wrap; gap: 12px; flex: 0 0 auto;\n    background: var(--navy-900); color: #fff;\n    margin: -14px -14px 14px -14px; padding: 13px 20px;\n  }\n  .header::after { content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: var(--grad); }\n  h1 {\n    font-family: 'Hanken Grotesk', system-ui, sans-serif; font-size: 16px; font-weight: 700;\n    margin: 0; letter-spacing: -0.01em; color: #fff; display: flex; align-items: center; gap: 10px;\n  }\n  h1 span { color: rgba(255,255,255,.55); font-weight: 400; font-size: 12px; }\n  h1 .brandmark { font-family: 'Fredoka', system-ui, sans-serif; font-weight: 600; font-size: 21px; letter-spacing: .3px; color: #fff; line-height: 1; }\n  h1 .brandmark .bang { color: #8C84FF; margin-left: 1px; font-size: inherit; }\n  .logo-badge { display: inline-flex; align-items: center; justify-content: center; flex: none; width: 48px; height: 48px; }\n  .logo-badge img { width: 44px; height: 44px; object-fit: contain; display: block; }\n  .brand-sub {\n    font-family: 'Hanken Grotesk', sans-serif !important; font-size: 11px !important;\n    font-weight: 400; letter-spacing: .02em; color: rgba(255,255,255,.5) !important;\n    padding-left: 11px; margin-left: 3px; border-left: 1px solid rgba(255,255,255,.18); white-space: nowrap;\n    display: inline-flex; flex-direction: column; align-items: center; line-height: 1.25;\n  }\n  .brand-sub em { font-style: italic; font-size: 9.5px; color: rgba(255,255,255,.4); }\n  #period-label { font-variant-numeric: tabular-nums; }\n  /* ── Layout & panels ── */\n  .layout { display: grid; grid-template-columns: 286px 1fr; gap: 14px; flex: 1 1 auto; min-height: 0; }\n  .panel { background: var(--surface); border: 1px solid var(--rule); border-radius: 14px; padding: 8px; box-shadow: var(--shadow-card); }\n  #left-panel {\n    align-self: stretch; overflow-y: auto; scrollbar-width: thin;\n    background: var(--surface); border: 1px solid var(--rule); border-radius: 14px;\n    padding: 6px 14px 14px; box-shadow: var(--shadow-card);\n  }\n  #right-col { align-self: stretch; overflow-y: scroll; display: flex; flex-direction: column; min-height: 0; }\n  .panel h3, #left-panel h3 {\n    margin: 0 0 10px; font-size: 11px; font-weight: 500; color: var(--ink-4);\n    text-transform: uppercase; letter-spacing: 0.14em;\n  }\n  .charts { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); grid-template-rows: auto auto; gap: 8px 14px; align-items: start; }\n  .chart-box {\n    padding: 4px 6px 2px; display: flex; flex-direction: column;\n  }\n  .chart-box h3 {\n    margin: 0 0 3px; color: var(--ink); text-transform: none; letter-spacing: -0.01em; font-size: 13.5px;\n    font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 700;\n  }\n  .chart-box .sub { font-size: 10px; color: var(--ink-3); margin-bottom: 3px; line-height: 1.4; }\n  .chart-wrap { position: relative; }\n  .chart-chips { position: absolute; top: 6%; right: 5%; display: flex; gap: 5px; z-index: 5; }\n  .warn-chip {\n    width: 20px; height: 20px; border-radius: 5px; cursor: help;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 12px; line-height: 1; position: relative;\n    border: 1px solid; box-shadow: 0 1px 2px rgba(13,24,39,.10);\n  }\n  .warn-chip.exp    { background: #ECEAF6; border-color: #BBB1DA; color: #5C4F93; }\n  .warn-chip.target { background: #F6EFDD; border-color: #DCC79A; color: #8A6314; }\n  .warn-chip.zlb    { background: #F6EBDD; border-color: #DCC097; color: #8A5A18; }\n  .warn-chip .chip-pop {\n    display: none; position: absolute; top: 26px; right: 0; width: 214px;\n    background: var(--navy-900); color: #EEF1F4; font-size: 10.5px; line-height: 1.55;\n    padding: 9px 11px; border-radius: 6px; box-shadow: 0 4px 14px rgba(13,24,39,.28);\n    z-index: 10; font-weight: 400; text-transform: none; letter-spacing: 0;\n  }\n  .warn-chip:hover .chip-pop { display: block; }\n  .warn-chip .chip-pop::after {\n    content: ''; position: absolute; top: -5px; right: 6px;\n    border-left: 5px solid transparent; border-right: 5px solid transparent;\n    border-bottom: 5px solid var(--navy-900);\n  }\n  /* ── Controls / sliders ── */\n  .control { margin-bottom: 11px; }\n  .control label { display: flex; align-items: center; font-size: 11.5px; color: var(--ink-2); margin-bottom: 5px; }\n  .control label > span:last-child { margin-left: auto; }\n  .control label .ctl-sym > span:last-child { margin-left: 6px; }\n  .control label .val { font-weight: 500; color: var(--ink); font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }\n  .control label .val-edit {\n    font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums;\n    width: 58px; text-align: right; border: 1px solid transparent; border-radius: 4px;\n    background: transparent; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; padding: 1px 4px;\n  }\n  .control label .val-edit:hover { border-color: var(--rule-2); background: var(--surface); }\n  .control label .val-edit:focus { border-color: var(--accent); background: var(--surface); outline: none; box-shadow: 0 0 0 3px var(--accent-ring); }\n  .control label .val-suffix { color: var(--ink); font-weight: 500; font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }\n  /* range input restyled to teal */\n  .control input[type=range] {\n    width: 100%; height: 16px; -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer;\n  }\n  .control input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 999px; background: var(--rule-2); }\n  .control input[type=range]::-moz-range-track { height: 4px; border-radius: 999px; background: var(--rule-2); }\n  .control input[type=range]::-webkit-slider-thumb {\n    -webkit-appearance: none; appearance: none; width: 15px; height: 15px; margin-top: -5.5px;\n    border-radius: 50%; background: var(--surface); border: 1.5px solid var(--accent); box-shadow: var(--shadow-thumb);\n  }\n  .control input[type=range]::-moz-range-thumb {\n    width: 15px; height: 15px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--accent); box-shadow: var(--shadow-thumb);\n  }\n  .control input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 4px var(--accent-tint), var(--shadow-thumb); }\n  .control input[type=range]:active::-webkit-slider-thumb { background: var(--accent); box-shadow: 0 0 0 4px var(--accent-ring); }\n  .control input[type=range]:focus { outline: none; }\n  .section-divider { border-top: 1px solid var(--rule); margin: 14px 0 10px; padding-top: 10px; }\n  .side-section { border-top: 1px solid var(--rule); }\n  .side-section:first-child { border-top: none; }\n  .side-head {\n    display: flex; align-items: center; gap: 7px; cursor: pointer;\n    padding: 11px 0 10px; user-select: none;\n    font-size: 11px; font-weight: 500; color: var(--ink-4);\n    text-transform: uppercase; letter-spacing: 0.14em;\n  }\n  .side-head:hover { color: var(--ink); }\n  .side-head .side-arrow { transition: transform 0.15s; font-size: 9px; color: var(--ink-4); }\n  .side-section.open .side-head .side-arrow { transform: rotate(90deg); }\n  .side-body { display: none; padding-bottom: 12px; }\n  .side-section.open .side-body { display: block; }\n  .debt-cue { font-size: 11px; line-height: 1.5; padding: 8px 10px; margin: 4px 0 8px; border-radius: 6px; border: 1px solid transparent; }\n  .debt-cue.snowball { background: #F6E7E2; border-color: #DBB6A9; color: #9A4128; }\n  .debt-cue.stable   { background: var(--accent-tint); border-color: var(--accent-tint-2); color: var(--accent-active); }\n  .debt-cue.neutral  { background: var(--surface-tint); border-color: var(--rule); color: var(--ink-3); }\n  /* ── Toggle rows ── */\n  .toggle-row {\n    display: flex; align-items: center; gap: 9px; padding: 8px 10px;\n    background: var(--surface-tint); border: 1px solid var(--rule); border-radius: 10px; margin: 7px 0;\n    cursor: pointer; user-select: none; font-size: 11.5px; color: var(--ink-2);\n  }\n  .toggle-row.on { background: var(--accent-tint); border-color: var(--accent-tint-2); color: var(--accent-active); font-weight: 500; }\n  .toggle-row .sw { width: 30px; height: 17px; background: var(--rule-2); border-radius: 999px; position: relative; transition: background 0.15s; flex: none; }\n  .toggle-row .sw::after { content: ''; position: absolute; left: 2px; top: 2px; width: 13px; height: 13px; background: #fff; border-radius: 50%; transition: left 0.15s; box-shadow: var(--shadow-thumb); }\n  .toggle-row.on .sw { background: var(--accent); }\n  .toggle-row.on .sw::after { left: 15px; }\n  /* ── Buttons (panel context = light) ── */\n  button {\n    padding: 5px 9px; border: 1px solid var(--rule-2); background: var(--surface); border-radius: 8px; white-space: nowrap;\n    cursor: pointer; font-size: 11.5px; font-family: 'Hanken Grotesk', sans-serif; font-weight: 500; color: var(--ink-2);\n    transition: background .12s, border-color .12s, color .12s;\n  }\n  button:hover { background: var(--accent-tint); border-color: var(--accent-tint-2); color: var(--accent); }\n  button:active { transform: translateY(0.5px); }\n  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }\n  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }\n  button:disabled { opacity: 0.4; cursor: not-allowed; }\n  button:disabled:hover { background: var(--surface); border-color: var(--rule-2); color: var(--ink-2); }\n  button.reverse { background: var(--surface-tint); }\n  button.reverse:hover:not(:disabled) { background: var(--accent-tint); }\n  button.copy { background: var(--accent-tint); border-color: var(--accent-tint-2); color: var(--accent); }\n  button.copy:hover { background: var(--accent-tint-2); }\n  /* Header buttons sit on navy → light treatment */\n  .header .run-controls button {\n    background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.20); color: rgba(255,255,255,.88);\n  }\n  .header .run-controls button:hover:not(:disabled) { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.32); color: #fff; }\n  .header .run-controls button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }\n  .header .run-controls button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }\n  .header .run-controls button.copy { background: rgba(46,125,116,.22); border-color: rgba(46,125,116,.5); color: #9FD0C8; }\n  .header .run-controls button:disabled { opacity: .35; }\n  .header .run-controls select {\n    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.20); color: #fff;\n    border-radius: 5px; padding: 5px 8px; font-family: 'Hanken Grotesk', sans-serif;\n  }\n  .header .run-controls select option { color: var(--ink); }\n  .shock-btn { width: 100%; background: #FBEDE3; border-color: #DBA886; color: #9A4D26; font-weight: 500; margin-top: 4px; }\n  .shock-btn:hover { background: #F6E0D0; border-color: #C98A60; color: #9A4D26; }\n  .shock-indicator { font-size: 10.5px; color: var(--ink-3); margin-top: 6px; text-align: center; padding: 3px 6px; border-radius: 4px; min-height: 18px; font-family: 'IBM Plex Mono', monospace; }\n  .shock-indicator.active { color: #9A4D26; background: #FBEDE3; }\n  .run-controls { display: flex; gap: 5px; flex-wrap: nowrap; align-items: center; }\n  /* ── Stat readouts ── */\n  .readout { display: flex; flex-wrap: nowrap; gap: 5px; margin: 10px 0 2px; flex: 0 0 auto; }\n  #right-col.eq-open { overflow-y: scroll; }\n  #right-col:not(.eq-open) { overflow-y: scroll; }\n  #right-col.eq-open .charts { flex: 0 0 auto; height: auto; }\n  .stat { flex: 1 1 0; min-width: 0; background: var(--surface); padding: 6px 7px; border-radius: 10px; border: 1px solid var(--rule); white-space: nowrap; overflow: hidden; box-shadow: var(--shadow-card); }\n  .stat .label { color: var(--ink-4); font-size: 9px; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .05em; }\n  .stat .value { display: block; font-weight: 500; font-size: 11px; font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; color: var(--ink); }\n  .stat .delta { display: block; font-size: 9px; color: var(--ink-3); margin: 1px 0 0 0; font-family: 'Hanken Grotesk', sans-serif; font-weight: 400; }\n  .stat .delta.pos { color: #15BE53; }\n  .stat .delta.neg { color: #E25950; }\n  /* ── SVG charts ── */\n  svg { display: block; width: 100%; height: var(--chart-h); touch-action: none; }\n  .axis-line { stroke: var(--rule-strong); stroke-width: 0.9; fill: none; }\n  .axis-label { fill: var(--ink-3); font-size: 10px; font-family: 'Hanken Grotesk', sans-serif; }\n  .grid-line { stroke: var(--rule); stroke-width: 0.6; }\n  .curve { fill: none; stroke-width: 2.2; pointer-events: none; }\n  .curve-is { stroke: var(--curve-is); }\n  .curve-mp { stroke: var(--curve-mp); }\n  .curve-real { stroke: var(--curve-mp); stroke-dasharray: 5 3; stroke-width: 1.4; opacity: 0.7; }\n  .curve-uip { stroke: var(--curve-uip); }\n  .curve-eps { stroke: var(--curve-eps); stroke-dasharray: 5 3; stroke-width: 1.4; opacity: 0.9; }\n  .curve-pc { stroke: var(--curve-pc); }\n  .curve-natural { stroke: var(--ink-4); stroke-dasharray: 4 3; stroke-width: 1; fill: none; }\n  .curve-target { stroke: var(--rule-strong); stroke-dasharray: 2 2; stroke-width: 0.9; fill: none; }\n  .eq-point { fill: var(--navy-800); stroke: #fff; stroke-width: 1.8; pointer-events: none; }\n  .handle { fill: #fff; stroke-width: 2.2; cursor: grab; r: 8; filter: drop-shadow(0 1px 1.5px rgba(13,24,39,.18)); }\n  .handle:hover { fill: var(--surface-tint); }\n  .dragging .handle.active { cursor: grabbing; }\n  .curve-label { font-size: 10.5px; font-weight: 600; font-family: 'Hanken Grotesk', sans-serif; pointer-events: none; }\n  .label-is { fill: var(--curve-is); }\n  .label-mp { fill: var(--curve-mp); }\n  .label-uip { fill: var(--curve-uip); }\n  .label-pc { fill: var(--curve-pc); }\n  .ts-line { fill: none; stroke-width: 1.6; }\n  .legend-row { display: flex; gap: 12px; font-size: 10.5px; color: var(--ink-3); margin: 4px 0 0 4px; flex-wrap: wrap; }\n  .legend-row span { display: inline-flex; align-items: center; gap: 4px; }\n  .legend-swatch { width: 12px; height: 2.5px; border-radius: 2px; display: inline-block; }\n  /* ── Equation boxes ── */\n  .eq-box { margin: 8px 4px 2px; padding: 0; background: var(--surface-2); border: 1px solid var(--rule); border-radius: 10px; font-size: 11px; line-height: 1.7; color: var(--ink-3); font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }\n  .eq-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 10px; font-size: 10.5px; color: var(--ink-3); user-select: none; font-family: 'Hanken Grotesk', sans-serif; }\n  .eq-toggle:hover { color: var(--ink); }\n  .eq-toggle .eq-arrow { transition: transform 0.15s; font-size: 9px; }\n  .eq-box.open .eq-toggle .eq-arrow { transform: rotate(90deg); }\n  .eq-body { display: none; padding: 4px 10px 9px; border-top: 1px solid var(--rule); }\n  .eq-box.open .eq-body { display: block; }\n  .eq-box .eq-line { display: block; white-space: normal; overflow-wrap: break-word; }\n  .eq-box .eq-anchor { color: var(--ink-2); font-weight: 500; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--rule); }\n  .eq-box .eq-total { margin-top: 3px; padding-top: 3px; border-top: 1px solid var(--rule); }\n  .eq-box .eq-total .eq-res { font-weight: 500; }\n  .eq-box .eq-sym { color: var(--ink-3); }\n  .eq-box .eq-num { color: var(--ink-2); }\n  .eq-box .eq-res { color: var(--ink); font-weight: 500; }\n  .eq-box .eq-lbl { color: var(--ink-4); display: inline-block; min-width: 34px; }\n  .eq-box .t { font-weight: 500; }\n  .hint { font-size: 10.5px; color: var(--ink-3); margin-top: 4px; line-height: 1.5; }\n  body.dragging * { cursor: grabbing !important; }\n  .zlb-line { stroke: #6FA8C8; stroke-dasharray: 3 3; stroke-width: 1; fill: none; }\n  .zlb-banner { background: #FBEDE3; color: #9A4D26; border: 1px solid #C98A60; padding: 6px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 500; margin-bottom: 8px; text-align: center; }\n  .exp-banner { background: #ECEAF6; color: #5C4F93; border: 1px solid #9F95C9; padding: 6px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 500; margin-bottom: 8px; text-align: center; }\n  .target-banner { background: #F6EFDD; color: #8A6314; border: 1px solid #C9AE6E; padding: 6px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 500; margin-bottom: 8px; text-align: center; }\n  .warn-chip.wicksell { background: #F6E7E2; border-color: #DBB6A9; color: #9A4128; }\n  .warn-chip.anchor { background: #F6E7E2; border-color: #DBB6A9; color: #9A4128; }\n  .warn-chip.pulse { animation: chip-pulse 1.1s ease-in-out infinite; }\n  @keyframes chip-pulse { 0%,100% { box-shadow: 0 1px 2px rgba(13,24,39,.10); } 50% { box-shadow: 0 0 0 5px rgba(176,87,63,.30); } }\n  .theta-meter { margin-top: 6px; font-size: 10px; color: var(--ink-3); line-height: 1.4; }\n  .theta-meter.hidden { display: none; }\n  .theta-meter .tm-track { position: relative; height: 7px; border-radius: 4px; background: var(--rule-2); margin: 3px 0 4px; overflow: visible; }\n  .theta-meter .tm-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; transition: width 0.2s, background 0.2s; }\n  .theta-meter .tm-start { position: absolute; top: -2px; width: 2px; height: 11px; background: var(--ink); border-radius: 1px; transform: translateX(-1px); }\n  .theta-meter .tm-row { display: flex; justify-content: space-between; }\n  .theta-meter .tm-warn { color: #B0573F; font-weight: 600; }\n  .locked { opacity: 0.22; pointer-events: none; filter: grayscale(100%); }\n  .drill-trigger { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--ink-3); cursor: pointer; user-select: none; margin-left: 8px; text-transform: none; font-weight: normal; letter-spacing: 0; }\n  .drill-trigger:hover { color: var(--accent); }\n  .drill-container { display: none; padding: 10px; background: var(--surface-2); border: 1px solid var(--rule); border-radius: 6px; margin-top: 8px; }\n  .drill-container.open { display: block; }\n  .drill-eq { font-size: 11.5px; font-weight: 500; color: var(--ink); margin-bottom: 8px; text-align: center; border-bottom: 1px solid var(--rule); padding-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }\n  .drill-eq .ref { font-weight: normal; color: var(--ink-4); font-size: 10px; margin-left: 6px; font-family: 'Hanken Grotesk', sans-serif; }\n  .drill-graphs { display: flex; gap: 10px; flex-wrap: wrap; }\n  .drill-col { flex: 1; min-width: 140px; }\n  .drill-col .sub { text-align: center; font-size: 10px; color: var(--ink-3); margin-bottom: 4px; }\n  .drill-svg-wrap { position: relative; width: 100%; height: 140px; }\n  .drill-svg-wrap svg { width: 100%; height: 100%; display: block; touch-action: none; }\n  .drill-btn-row { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }\n  @media (max-width: 850px) {\n    body { overflow-y: auto; }\n    .layout { display: flex; flex-direction: column; overflow-y: visible; }\n    #left-panel, #right-col { overflow-y: visible; height: auto; }\n    .charts { grid-template-columns: 1fr; grid-template-rows: none; height: auto; }\n  }\n  .eq-ref { margin-left: auto; color: var(--ink-4); font-size: 0.85em; font-family: 'Hanken Grotesk', sans-serif; }\n  /* Help mode */\n  .help-mode .curve-label { pointer-events: auto; }\n  .sym { cursor: default; }\n  .help-mode .sym { border-bottom: 1px dotted var(--ink-4); cursor: help; position: relative; }\n  .sym .sym-pop { display: none; }\n  #svg-tooltip { display: none; }\n  .sym-pop {\n    position: fixed; width: max-content; max-width: 240px;\n    background: var(--navy-900); color: #fff; padding: 8px 10px; border-radius: 6px;\n    box-shadow: 0 4px 14px rgba(13,24,39,.28); font-size: 10.5px;\n    font-family: 'Hanken Grotesk', system-ui, sans-serif; line-height: 1.5;\n    white-space: normal; z-index: 1000; pointer-events: none;\n    font-weight: 400; text-transform: none; letter-spacing: 0;\n  }\n  .sym-pop::after { content: attr(data-tooltip); }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"sym-pop\" id=\"svg-tooltip\" data-tooltip=\"\"><\u002Fdiv>\n\n<div class=\"header\" style=\"background-color: rgb(10, 37, 64); padding: 7px 20px\">\n  <h1 data-comment-anchor=\"8df8299468-h1\"><span class=\"logo-badge\" aria-hidden=\"true\"><img src=\"6542892a-137a-4a8b-b198-417670733297\" alt=\"Economo mole\"><\u002Fspan><span class=\"brandmark\" style=\"color: rgb(246, 249, 252)\" data-comment-anchor=\"c117c68839-span\">Economo<\u002Fspan><span class=\"brand-sub\">IS–LM–PC–UIP<em>macro lab<\u002Fem><\u002Fspan><span id=\"period-label\" style=\"margin-left:8px\">period 0<\u002Fspan><\u002Fh1>\n  <div class=\"run-controls\">\n    <button onclick=\"toggleHelpMode()\" id=\"btn-help-mode\" title=\"Hover over any symbol to see its definition.\">❓ Help Mode: OFF<\u002Fbutton>\n      <select id=\"stage-dropdown\" onchange=\"goToStage(parseInt(this.value))\" style=\"font-size:1em; font-weight:500;\" data-comment-anchor=\"0d1fc5169d-select\"><\u002Fselect>\n      <button onclick=\"advanceTutorial()\" id=\"btn-advance\" class=\"primary\">Next<\u002Fbutton>\n    <button onclick=\"reset()\">↺ Reset<\u002Fbutton>\n    <button class=\"reverse\" id=\"reverse-btn\" onclick=\"reverseStep()\" disabled=\"\">← Reverse<\u002Fbutton>\n    <button onclick=\"stepPeriod()\">→ Step one period<\u002Fbutton>\n    <button class=\"primary\" onclick=\"jumpLongRun()\">⟹ Run to rebalance<\u002Fbutton>\n    <button class=\"copy\" id=\"copy-btn\" onclick=\"copyState()\">📋 Copy state<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"layout\">\n\n  <div id=\"left-panel\">\n    <div id=\"sidebar-group-toggle\" class=\"side-head\" style=\"background: var(--accent-tint); color: var(--accent); margin-bottom: 10px; cursor: pointer; padding: 11px 10px 10px 13px; border-radius: 12px\" onclick=\"toggleSidebarGroup()\">Group by: <span id=\"sidebar-group-label\">Function ▸<\u002Fspan><\u002Fdiv>\n    <div class=\"side-section open\" id=\"sec-presets\">\n      <div class=\"side-head\" onclick=\"toggleSection('sec-presets')\"><span class=\"side-arrow\">▶<\u002Fspan>Preset scenarios<\u002Fdiv>\n      <div class=\"side-body\">\n        <select id=\"scenario-select\" onchange=\"previewScenario(this.value)\" style=\"width:100%;padding:5px;font-family:inherit;font-size:inherit;border:1px solid #c4c2bb;border-radius:5px;\"><\u002Fselect>\n        <button id=\"scenario-load-btn\" onclick=\"applySelectedScenario()\" style=\"width:100%;margin-top:6px;\" disabled=\"\">Load scenario<\u002Fbutton>\n        <div id=\"scenario-narrative\" class=\"hint\" style=\"margin-top:6px;min-height:40px;\">Select a scenario to see its description.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"side-section open\" id=\"sec-policy\">\n      <div class=\"side-head\" onclick=\"toggleSection('sec-policy')\"><span class=\"side-arrow\">▶<\u002Fspan>Policy &amp; exogenous variables<\u002Fdiv>\n      <div class=\"side-body\">\n        <div id=\"controls\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"side-section\" id=\"sec-dynamics\">\n      <div class=\"side-head\" onclick=\"toggleSection('sec-dynamics')\"><span class=\"side-arrow\">▶<\u002Fspan>Adjustment dynamics<\u002Fdiv>\n      <div class=\"side-body\">\n        <div id=\"dynamics-controls\"><\u002Fdiv>\n        <div class=\"control\" id=\"speed-wrap\">\n          <label>Price flex (medium-run speed) <span class=\"info-icon\" title=\"How quickly prices adjust to output gaps. High flex = fast return to natural rate; low flex = persistent gaps.\">ℹ<\u002Fspan> <span class=\"val\" id=\"speed-val\">0.5<\u002Fspan><\u002Flabel>\n          <input type=\"range\" id=\"speed\" min=\"0.05\" max=\"1\" step=\"0.05\" value=\"0.5\">\n        <\u002Fdiv>\n        <div class=\"toggle-row\" id=\"taylor-toggle\" onclick=\"toggleTaylor()\">\n          <div class=\"sw\"><\u002Fdiv>\n          <span>Taylor rule active<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"toggle-row\" id=\"deanchor-toggle\" onclick=\"toggleDeanchor()\">\n          <div class=\"sw\"><\u002Fdiv>\n          <span>Allow expectations to de-anchor<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hint\" id=\"hint-dynamics\">\n          π* = 2% target. Expectations are anchored by the product of two sliders:\n          <strong>Max anchoring θ<\u002Fstrong> is the ceiling (how credible this central bank can ever be),\n          and <strong>Current credibility<\u002Fstrong> is where anchoring sits right now (0–100% of that ceiling).\n          Effective anchoring = θ × credibility: at θ=1, full credibility pins expectations to π*; at credibility 0,\n          expectations adapt fully to past inflation.\n          <br><strong>Allow de-anchoring:<\u002Fstrong> when on, current credibility moves on its own each period —\n          it erodes if inflation sits far from target for a sustained stretch, and rebuilds toward the ceiling\n          when inflation returns to target. You can also drag credibility yourself at any time. When off,\n          credibility is held fixed where you set it.\n          <br>With the Taylor rule ON the CB sets\n          i = Neutral rate plus φ(π−π*) + 0.25·gap (φ &gt; 1 is the Taylor principle).\n          Stability notes: with the Taylor rule OFF, θ_eff below ≈0.65 is\n          Wicksell-unstable (fixed i + adaptive expectations spiral); with θ_eff = 1,\n          φ above ≈2 can overshoot and spiral. φ ≈ 1.2–2 is robust.\n          <br><em>Note: designed for comparative-static stepping, not multi-decade simulation.<\u002Fem>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"side-section\" id=\"sec-shocks\">\n      <div class=\"side-head\" onclick=\"toggleSection('sec-shocks')\"><span class=\"side-arrow\">▶<\u002Fspan>Supply shocks<\u002Fdiv>\n      <div class=\"side-body\">\n        <div id=\"shock-controls\"><\u002Fdiv>\n        <button class=\"shock-btn\" id=\"oil-shock-btn\" onclick=\"applyOilShock()\">⚡ Apply oil shock (+5%)<\u002Fbutton>\n        <div class=\"shock-indicator\" id=\"shock-indicator\">no active pulse<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"side-section\" id=\"sec-debt\">\n      <div class=\"side-head\" onclick=\"toggleSection('sec-debt')\"><span class=\"side-arrow\">▶<\u002Fspan>Government debt<\u002Fdiv>\n      <div class=\"side-body\">\n        <div id=\"debt-controls\"><\u002Fdiv>\n        <div class=\"debt-cue\" id=\"debt-cue\"><\u002Fdiv>\n        <div class=\"hint\" id=\"hint-debt\">\n          Set a starting debt ratio d = B/Y and a trend growth rate g, then create a primary\n          deficit by raising G above T (or a surplus to pay debt down). The debt ratio evolves by\n          Δd = (r − g)·d − s, where s = (T−G)/Y is the primary surplus. When r &gt; g the ratio\n          snowballs even with a balanced budget; when g &gt; r it erodes on its own. g enters the\n          debt accounting only — it is an assumed trend, not modelled growth in output.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n\n  <\u002Fdiv>\n\n  <div id=\"right-col\">\n    <div class=\"panel charts\" data-comment-anchor=\"8ed3e141fb-div\">\n\n      <div class=\"chart-box\" id=\"chart-box-ismp\">\n        <h3>ISLM (goods market &amp; policy rate)<\u002Fh3>\n        <div class=\"sub\">Solid blue = nominal LM. Dashed blue = real r = i − πᵉ. Drag IS for fiscal, LM for monetary.<\u002Fdiv>\n        <div class=\"chart-wrap\">\n          <svg id=\"ismp\" viewBox=\"0 0 360 220\"><\u002Fsvg>\n          <div class=\"chart-chips\" id=\"ismp-chips\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"legend-row\">\n          <span><span class=\"legend-swatch\" style=\"background:#E25950\"><\u002Fspan>IS: Y = f(G,T,r,ε)<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#635BFF\"><\u002Fspan>LM: i (nominal)<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:transparent;border-top:1.5px dashed #635BFF;height:0\"><\u002Fspan>real r<\u002Fspan>\n          <span>Yₙ <span style=\"display:inline-block;width:18px;border-top:1px dashed #999;vertical-align:middle\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eq-box\" id=\"box-eq-ismp\"><div class=\"eq-toggle\" onclick=\"toggleEq('box-eq-ismp')\"><span class=\"eq-arrow\">▶<\u002Fspan><span>Show the equations behind this chart<\u002Fspan><\u002Fdiv><div class=\"eq-body\" id=\"eq-ismp\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"chart-box\" id=\"chart-box-uip\">\n        <h3>UIP (interest rate &amp; exchange rate)<\u002Fh3>\n        <div class=\"sub\">Solid green = UIP (nominal E). Gold dashed = real ε = E·P/P*.<\u002Fdiv>\n        <svg id=\"uip\" viewBox=\"0 0 360 220\"><\u002Fsvg>\n        <div class=\"legend-row\">\n          <span><span class=\"legend-swatch\" style=\"background:#0FA9A0\"><\u002Fspan>UIP: E = Eᵉ(1+i)/(1+i*)<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:transparent;border-top:1.5px dashed #F5A623;height:0\"><\u002Fspan>real ε<\u002Fspan>\n          <span>i* = <span id=\"istar-readout\">3.0%<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"eq-box\" id=\"box-eq-uip\"><div class=\"eq-toggle\" onclick=\"toggleEq('box-eq-uip')\"><span class=\"eq-arrow\">▶<\u002Fspan><span>Show the equations behind this chart<\u002Fspan><\u002Fdiv><div class=\"eq-body\" id=\"eq-uip\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"chart-box\" id=\"chart-box-pc\">\n        <h3>Phillips curve<\u002Fh3>\n        <div class=\"sub\">Drag PC vertically to change πᵉ. Cost-push z lifts the whole curve.<\u002Fdiv>\n        <div class=\"chart-wrap\">\n          <svg id=\"pc\" viewBox=\"0 0 360 220\"><\u002Fsvg>\n          <div class=\"chart-chips\" id=\"pc-chips\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"legend-row\">\n          <span><span class=\"legend-swatch\" style=\"background:#E0408E\"><\u002Fspan>π = πᵉ + α(Y−Yₙ)/Yₙ + z <span class=\"drill-trigger\" data-block=\"PC\" onclick=\"toggleDrill('drill-pc')\">derivation ▸<\u002Fspan><\u002Fspan>\n          <span>πᵉ = <span id=\"pie-readout\">2.0%<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"drill-container\" id=\"drill-pc\">\n          <div class=\"drill-graphs\">\n            <div class=\"drill-col\" id=\"drill-pc-wsps\">\n              <div class=\"drill-eq\" id=\"drill-eq-wsps\">uₙ = (m+z)/α_WS <span class=\"ref\">(Blanchard eq. 8.4)<\u002Fspan><\u002Fdiv>\n              <div class=\"sub\">Labour market (WS-PS)<\u002Fdiv>\n              <div class=\"drill-svg-wrap\"><svg id=\"svg-drill-pc-a\" viewBox=\"0 0 160 140\"><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"drill-col\" id=\"drill-pc-okun\">\n              <div class=\"drill-eq\" id=\"drill-eq-okun\">Yₙ = L(1−uₙ) <span class=\"ref\">(Blanchard p.179; cf. Okun's Law box, eq 9B.1)<\u002Fspan><\u002Fdiv>\n              <div class=\"sub\">Okun's bridge<\u002Fdiv>\n              <div class=\"drill-svg-wrap\"><svg id=\"svg-drill-pc-b\" viewBox=\"0 0 160 140\"><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"drill-col\" id=\"drill-pc-phillips\">\n              <div class=\"drill-eq\" id=\"drill-eq-phillips\">π = πᵉ + (α/Yₙ)(Y−Yₙ) + z <span class=\"ref\">(Blanchard eq. 9.3)<\u002Fspan><\u002Fdiv>\n              <div class=\"sub\">Phillips curve<\u002Fdiv>\n              <div class=\"drill-svg-wrap\"><svg id=\"svg-drill-pc-c\" viewBox=\"0 0 160 140\"><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"eq-box\" id=\"box-eq-pc\"><div class=\"eq-toggle\" onclick=\"toggleEq('box-eq-pc')\"><span class=\"eq-arrow\">▶<\u002Fspan><span>Show the equations behind this chart<\u002Fspan><\u002Fdiv><div class=\"eq-body\" id=\"eq-pc\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"chart-box\">\n        <h3>Dynamics over time<\u002Fh3>\n        <div class=\"sub\">Y, i, π, P, ε, B/Y across periods.<\u002Fdiv>\n        <svg id=\"ts\" viewBox=\"0 0 360 220\"><\u002Fsvg>\n        <div class=\"legend-row\">\n          <span><span class=\"legend-swatch\" style=\"background:#16202e\"><\u002Fspan>Y<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#635BFF\"><\u002Fspan>i<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#E0408E\"><\u002Fspan>π<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#E25950\"><\u002Fspan>P<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#F5A623\"><\u002Fspan>ε<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background:#0FA9A0\"><\u002Fspan>B/Y<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"eq-box\" id=\"box-eq-ts\"><div class=\"eq-toggle\" onclick=\"toggleEq('box-eq-ts')\"><span class=\"eq-arrow\">▶<\u002Fspan><span>Show the equations behind this chart<\u002Fspan><\u002Fdiv><div class=\"eq-body\" id=\"eq-ts\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"readout\" id=\"readout\"><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n// -------------------------------------------------------------------------\n// Tutorial State & Machine\n// -------------------------------------------------------------------------\nconst TUTORIAL_BLOCKS = ['GOODS', 'ISLM', 'UIP', 'PC', 'DEBT'];\n\nconst TUTORIAL_STAGES = [\n  { label: 'IS-LM Model',       economy: 'closed', unlocked: ['GOODS', 'ISLM'] },\n  { label: 'IS-LM-UIP Model',   economy: 'open',   unlocked: ['GOODS', 'ISLM', 'UIP'] },\n  { label: 'IS-LM-PC Model',    economy: 'closed', unlocked: ['GOODS', 'ISLM', 'UIP', 'PC'] },\n  { label: 'Full Model',        economy: 'open',   unlocked: ['GOODS', 'ISLM', 'UIP', 'PC'] },\n  { label: '+ Government Debt', economy: 'open',   unlocked: ['GOODS', 'ISLM', 'UIP', 'PC', 'DEBT'] }\n];\n\nlet tutorialState = {\n  stage: 0,\n  unlocked: new Set(['GOODS', 'ISLM'])\n};\nlet renderTutorial = () => {}; // Replaced later with DOM-dependent function\n\nfunction currentStage() {\n  return TUTORIAL_STAGES[tutorialState.stage];\n}\n\nfunction goToStage(i) {\n  if (i < 0 || i >= TUTORIAL_STAGES.length) return;\n  tutorialState.stage = i;\n  tutorialState.unlocked = new Set(TUTORIAL_STAGES[i].unlocked);\n  if (typeof render === 'function') render(); else renderTutorial();\n}\n\n\n\nfunction resetTutorial() {\n  goToStage(0);\n}\n\n// -------------------------------------------------------------------------\n// Constants\n// -------------------------------------------------------------------------\nconst PI_TARGET     = 0.02;\nconst OIL_SHOCK     = 0.05;\nconst Z_PULSE_DECAY = 0.7;\nconst PSI           = 0.25;\nconst RHO_TAYLOR    = 0.75;\nconst ZLB           = -0.005;\nconst ZLB_EPS       =  1e-6;\n\n// Endogenous de-anchoring constants\nconst DEANCHOR_TOL  = 0.02;   // |π − π*| tolerated before credibility erodes\nconst DEANCHOR_ERO  = 0.04;   // credibility erosion rate per period\nconst DEANCHOR_REC  = 0.03;   // credibility recovery rate per period\n\n// IS curve in deviation form: output = baseline + responses to deviations of each driver\n// from its baseline. Y is an index (100 = potential output). G and T are centred on a\n// realistic ~20% government share of output, so the baseline component split is realistic:\n// C≈58, I≈17, G≈20, NX≈5. r is the real rate, eps the real exchange rate.\nconst IS_Y_BASE  = 100;    // baseline output (index: 100 = potential)\nconst IS_G_BASE  = 20;     // baseline government spending (~20% of Y)\nconst IS_T_BASE  = 20;     // baseline taxes (balanced budget at baseline)\nconst IS_R_BASE  = 0.01;   // baseline (natural) real interest rate = 1%\nconst IS_EPS_BASE = 1;     // baseline real exchange rate\n\n// ─── Structural IS primitives (Blanchard eq. 19.1) ───\n// c1 is slider-driven (default 0.5); d1, d1r are fixed.\nconst d1  = 0.10;   // investment accelerator dI/dY\nconst d1r = 200;    // investment rate-sensitivity |dI/dr|\n// k = 1/(1 - c1 - d1) is the fiscal multiplier. At c1=0.5,d1=0.1: k = 2.5.\n// Do NOT hard-code 2.5 — always compute from current c1.\n\n// ─── PC natural rate (Blanchard eq. 8.4) ───\n// un = (m_struct + z_struct)/ALPHA_WS ;  Y_n = L_LABOR*(1 - un)\n// ALPHA_WS is the WAGE-SETTING slope — FIXED, and DISTINCT from the PC-slope slider.\n// Baseline: m=0.05, z=0.10, ALPHA_WS=3.0 → un = 0.15/3.0 = 0.05 (5%).\nconst ALPHA_WS = 3.0;\nconst L_LABOR  = 100 / (1 - 0.05);   // ≈ 105.2632, so Y_n = 100 at baseline\n\n// ─── Open-economy IS primitives (Blanchard eq. 19.1/19.2) ───\n// m1 is slider-driven (default 0.30); x1, n1 are fixed.\nconst x1 = 0.30;   // export sensitivity to foreign output Y*\nconst n1 = 70;     // net-export sensitivity to ε (Marshall-Lerner ⇒ n1 > 0)\n// k_o = 1/(1 - c1 - d1 + m1) is the open multiplier. At c1=0.5,d1=0.1,m1=0.3: k_o ≈ 1.4286.\nconst YSTAR_BASE = 100;   // foreign output baseline\n\nconst IS_C0 = 20;   // c0  (autonomous consumption; = 32 − 12 as used in eq box)\nconst IS_D0 = 12;   // d0  (autonomous investment)\n\n// Open-economy IS, structural. k_o = 1/(1 − c1 − d1 + m1) — the import leakage m1 is\n// INSIDE the denominator, so a higher m1 lowers every multiplier (Blanchard Ch. 18).\nfunction openOn() {\n  return currentStage().economy === 'open';\n}\n\nfunction isOutput(G, T, r, eps, c1, m1, Ystar) {\n  const c  = (c1    !== undefined) ? c1    : 0.5;\n  const m  = openOn() ? ((m1 !== undefined) ? m1 : 0.30) : 0;\n  const Ys = (Ystar !== undefined) ? Ystar : YSTAR_BASE;\n  const k_o = 1 / (1 - c - d1 + m);\n  const trade = openOn() ? x1*Ys - n1*(eps - IS_EPS_BASE) : 0;\n  const A = IS_C0 - c*T + IS_D0 - d1r*r + G + trade;\n  return k_o * A;\n}\n\n// Inverse: real rate r that puts the IS curve at output Y, then nominal i = r + pi_e.\n// Invert the r-channel only; all other terms move to the RHS, scaled by the SAME k_o.\nfunction isRateForOutput(Y, G, T, eps, pi_e, c1, m1, Ystar) {\n  const c  = (c1    !== undefined) ? c1    : 0.5;\n  const m  = openOn() ? ((m1 !== undefined) ? m1 : 0.30) : 0;\n  const Ys = (Ystar !== undefined) ? Ystar : YSTAR_BASE;\n  const k_o = 1 / (1 - c - d1 + m);\n  const trade = openOn() ? x1*Ys - n1*(eps - IS_EPS_BASE) : 0;\n  const A_without_r = IS_C0 - c*T + IS_D0 + G + trade;\n  const r = (A_without_r - Y / k_o) / d1r;\n  return r + pi_e;\n}\n\n// -------------------------------------------------------------------------\n// Parameter definitions\n// -------------------------------------------------------------------------\nconst paramDefs = [\n  { key: 'G',        block: 'GOODS', label: 'Govt spending, G',         min: 10,    max: 35,   step: 1,      fmt: v => v.toFixed(0) },\n  { key: 'T',        block: 'GOODS', label: 'Taxes, T',                 min: 10,    max: 35,   step: 1,      fmt: v => v.toFixed(0) },\n  { key: 'i_target', block: 'ISLM',  label: 'Policy rate (target), i',  min: -0.02, max: 0.15, step: 0.0025, fmt: v => (v*100).toFixed(2)+'%', editFmt: v => (v*100).toFixed(2), parse: v => v/100, suffix: '%' },\n  { key: 'i_star',   block: 'UIP',   label: 'Foreign rate, i*',         min: 0,     max: 0.10, step: 0.0025, fmt: v => (v*100).toFixed(2)+'%', editFmt: v => (v*100).toFixed(2), parse: v => v/100, suffix: '%' },\n  { key: 'E_e',      block: 'UIP',   label: 'Expected ex. rate, Eᵉ',    min: 0.7,   max: 1.3,  step: 0.01,   fmt: v => v.toFixed(2) },\n  { key: 'pi_e',     block: 'PC',    label: 'Expected inflation, πᵉ',   min: -0.02, max: 0.15, step: 0.0025, fmt: v => (v*100).toFixed(2)+'%', editFmt: v => (v*100).toFixed(2), parse: v => v/100, suffix: '%' },\n  { key: 'alpha',    block: 'PC',    label: 'PC slope, α',              min: 0.05, max: 0.5,  step: 0.01,   fmt: v => v.toFixed(2) },\n  { key: 'c1',       block: 'GOODS', label: 'MPC, c₁',                min: 0.30, max: 0.80, step: 0.01,   fmt: v => v.toFixed(2) },\n  { key: 'm1',       block: 'UIP',   label: 'Import prop., m₁',       min: 0.05, max: 0.60, step: 0.01,   fmt: v => v.toFixed(2) },\n  { key: 'Ystar',    block: 'UIP',   label: 'Foreign output, Y*',       min: 80,   max: 120,  step: 1,      fmt: v => v.toFixed(0) },\n  { key: 'm_struct', block: 'PC',    label: 'Markup, m', min: 0.01, max: 0.30, step: 0.005, fmt: v => v.toFixed(3), infoText: 'Price-setting markup (shifts natural rate)' },\n  { key: 'z_struct', block: 'PC',    label: 'Wage push, z', min: 0.01, max: 0.30, step: 0.005, fmt: v => v.toFixed(3), infoText: 'Structural wage-push (shifts natural rate)' }\n];\n\nconst shockDefs = [\n  { key: 'z',        block: 'PC',    label: 'Cost-push (PC shift), z',  min: -0.03, max: 0.10, step: 0.0025, fmt: v => (v*100).toFixed(2)+'%' }\n];\n\nconst dynamicsDefs = [\n  { key: 'theta',    block: 'PC', label: 'Max anchoring (ceiling), θ',  min: 0, max: 1, step: 0.05, fmt: v => v.toFixed(2) },\n  { key: 'cred',     block: 'PC', label: 'Current credibility',        min: 0, max: 1, step: 0.05, fmt: v => v.toFixed(2), meter: 'cred' },\n  { key: 'phi',      block: 'PC', label: 'Taylor response, φ',   min: 0, max: 3, step: 0.1,  fmt: v => v.toFixed(1) }\n];\n\nconst debtDefs = [\n  { key: 'B', block: 'DEBT', label: 'Initial govt debt d=B/Y, d', min: 0, max: 150, step: 1, fmt: v => v.toFixed(0) },\n  { key: 'g', block: 'DEBT', label: 'Trend growth (debt accounting), g', min: -0.02, max: 0.06, step: 0.0025, fmt: v => (v*100).toFixed(2)+'%', editFmt: v => (v*100).toFixed(2), parse: v => v/100, suffix: '%' }\n];\n\nconst initialState = {\n  G: 20, T: 20, P: 1.0, P_star: 1.0,\n  i_target: 0.03,\n  i: 0.03,\n  i_star: 0.03,\n  E_e: 1.0, pi_e: 0.02,\n  alpha: 0.3,\n  c1: 0.5,\n  m1: 0.30,\n  Ystar: 100,\n  m_struct: 0.05,\n  z_struct: 0.10,\n  z: 0, z_pulse: 0, theta: 1.0, cred: 1.0, deanchor_on: true, phi: 1.5, taylor_on: false, speed: 0.5, B: 0, g: 0.02, period: 0, history: []\n};\n\nlet state = clone(initialState);\nlet undoStack = [];\n\nfunction clone(o) { return JSON.parse(JSON.stringify(o)); }\nfunction clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }\n\n// -------------------------------------------------------------------------\n// Model\n// -------------------------------------------------------------------------\nfunction computeYn(s) {\n  const un = (s.m_struct + s.z_struct) / ALPHA_WS;\n  return L_LABOR * (1 - un);\n}\n\n// πᵉ only influences the model once the PC block (medium-run / expectations) is unlocked.\n// Before that we are in Blanchard's core short run: the rate is NOMINAL, r = i.\nfunction effectivePiE(s) {\n  return tutorialState.unlocked.has('PC') ? s.pi_e : 0;\n}\n\nfunction solve(s) {\n  const i = Math.max(ZLB, s.i);\n  const E = s.E_e * (1 + i) / (1 + s.i_star);\n  const eps = E * s.P / (s.P_star || 1);\n  const r = i - effectivePiE(s);\n  const Y_n = computeYn(s);\n  const Y = clamp(isOutput(s.G, s.T, r, eps, s.c1, s.m1, s.Ystar), 30, 200);\n  const z_eff = s.z + s.z_pulse;\n  const pi = clamp(s.pi_e + s.alpha * (Y - Y_n) / Y_n + z_eff, -0.20, 0.70);\n  const zlb_active = i <= ZLB + ZLB_EPS;\n  return { Y, i, r, pi, z_eff, E, eps, zlb_active, Y_n };\n}\n\n// Effective anchoring that drives expectations = the ceiling (θ) times current credibility.\nfunction effectiveTheta(s) {\n  return s.theta * s.cred;\n}\n\n// Credibility law of motion: erode when |π − π*| sits beyond the tolerance band,\n// recover toward 1 when inflation is back inside it.\nfunction nextCredibility(s, pi) {\n  if (!s.deanchor_on) return s.cred;\n  const gap = Math.abs(pi - PI_TARGET);\n  if (gap <= DEANCHOR_TOL) return clamp(s.cred + DEANCHOR_REC, 0, 1);\n  const excess = (gap - DEANCHOR_TOL) / 0.02;     // 2 pts beyond band ⇒ full erosion rate\n  return clamp(s.cred - DEANCHOR_ERO * excess, 0, 1);\n}\n// -------------------------------------------------------------------------\n// Time dynamics\n// -------------------------------------------------------------------------\nfunction step(s) {\n  const eq = solve(s);\n  const Y_n = computeYn(s);\n  const sp = s.speed;\n  const gap = (eq.Y - Y_n) / Y_n;\n\n  let raw_i = s.i_target;\n  if (s.taylor_on) {\n    const neutral_r = isRateForOutput(Y_n, s.G, s.T, eq.eps, PI_TARGET, s.c1, s.m1, s.Ystar) - PI_TARGET;\n    const neutral_i = neutral_r + PI_TARGET;\n    const taylor_target = neutral_i + s.phi * (eq.pi - PI_TARGET) + PSI * gap;\n    raw_i = clamp(RHO_TAYLOR * s.i + (1 - RHO_TAYLOR) * taylor_target, -0.05, 0.30);\n  }\n\n  let new_i = Math.max(ZLB, raw_i);\n\n  const theta_eff = effectiveTheta(s);\n  const pi_e_drift = theta_eff * (PI_TARGET - s.pi_e) + (1 - theta_eff) * (eq.pi - s.pi_e);\n  const new_pi_e = clamp(s.pi_e + sp * pi_e_drift, -0.10, 0.60);\n  const new_cred = nextCredibility(s, eq.pi);\n\n  const g = s.g || 0;\n  const new_B = clamp((s.B * (1 + eq.r) + (s.G - s.T)) / (1 + g), -200, 1000);\n\n  return {\n    ...s,\n    i: new_i,\n    P: s.P * (1 + eq.pi * sp),\n    P_star: (s.P_star || 1) * (1 + PI_TARGET * sp),\n    pi_e: new_pi_e,\n    cred: new_cred,\n    E_e: (1 - 0.4 * sp) * s.E_e + 0.4 * sp * eq.E,\n    z_pulse: s.z_pulse * Z_PULSE_DECAY,\n    B: new_B,\n    period: s.period + 1,\n    history: [...s.history, { period: s.period, ...eq, P: s.P, P_star: s.P_star || 1, B: s.B, pi_e: s.pi_e }]\n  };\n}\n\nconst CURVE_DEFS = {\n  'IS':  { meaning: 'goods-market equilibrium', ref: 'Ch. 5', role: 'output where demand equals production at each interest rate' },\n  'LM':  { meaning: 'monetary policy rate',     ref: 'Ch. 5', role: 'the interest rate the central bank sets' },\n  'UIP': { meaning: 'uncovered interest parity', ref: 'eq. 19.5', role: 'links domestic and foreign returns through the exchange rate' },\n  'PC':  { meaning: 'Phillips curve',           ref: 'eq. 9.3', role: 'links inflation to the output gap' },\n  'WS':  { meaning: 'wage-setting relation',    ref: 'eq. 7.1', role: 'real wage demanded by workers given unemployment' },\n  'PS':  { meaning: 'price-setting relation',   ref: 'eq. 7.6', role: 'real wage implied by firms\\' price markup' }\n};\n\nconst SYMBOL_DEFS = {\n  'ZLB': { meaning: 'zero lower bound', ref: 'Ch. 23', role: 'floor below which the nominal policy rate cannot fall' },\n  'π': { meaning: 'inflation rate', ref: 'eq. 9.3', role: 'the rate of change of prices' },\n  'α': { meaning: 'effect of output gap on inflation', ref: 'eq. 9.3', role: 'Phillips curve slope' },\n  'πᵉ': { meaning: 'expected inflation rate', ref: 'eq. 8.7', role: 'shifts the Phillips curve' },\n  'θ': { meaning: 'anchoring of expectations', ref: 'eq. 8.7', role: 'weight on target vs past inflation' },\n  'Yₙ': { meaning: 'natural or potential output', ref: 'eq. 8.4', role: 'level of output where π = πᵉ' },\n  'c₁': { meaning: 'marginal propensity to consume', ref: 'eq. 3.3', role: 'multiplier effect on output' },\n  'd₁ᵣ': { meaning: 'interest sensitivity of investment', ref: 'eq. 5.1', role: 'slope of the IS curve' },\n  'm₁': { meaning: 'marginal propensity to import', ref: 'eq. 19.1', role: 'open-economy leakage' },\n  'k_open': { meaning: 'open economy multiplier', ref: 'eq. 19.2', role: 'magnifies autonomous spending' },\n  'm': { meaning: 'price-setting markup', ref: 'eq. 8.4 (price-setting 7.3)', role: 'firms\\' markup of price over wage; raises the natural rate uₙ, lowering Yₙ' },\n  'Wage push z': { meaning: 'structural wage-push factor', ref: 'eq. 8.4', role: 'everything in wage-setting other than unemployment; raises uₙ, lowering Yₙ' },\n  'Cost-push z': { meaning: 'transitory cost-push shock', ref: 'eq. 9.3', role: 'temporary supply disturbance that shifts the Phillips curve; does NOT move Yₙ' },\n  'z': { meaning: 'catch-all structural or supply shift', ref: 'Ch. 8/9', role: 'moves the PC or natural rate' },\n  'uₙ': { meaning: 'natural rate of unemployment', ref: 'eq. 8.4', role: 'unemployment rate where π = πᵉ' },\n  'u': { meaning: 'unemployment rate', ref: 'eq. 7.1', role: 'fraction of labour force without a job' },\n  'c₀': { meaning: 'autonomous consumption', ref: 'eq. 3.3', role: 'consumption when disposable income is zero' },\n  'd₀': { meaning: 'autonomous investment', ref: 'eq. 5.1', role: 'investment independent of Y and r' },\n  'd₁': { meaning: 'output sensitivity of investment', ref: 'eq. 5.1', role: 'accelerator effect' },\n  'x₁': { meaning: 'sensitivity of exports to foreign output', ref: 'eq. 19.1', role: 'foreign demand' },\n  'n₁': { meaning: 'sensitivity of net exports to real exchange rate', ref: 'eq. 19.1', role: 'Marshall-Lerner condition' },\n  'ε': { meaning: 'real exchange rate', ref: 'eq. 17.1', role: 'relative price of domestic goods' },\n  'Y': { meaning: 'output / income', ref: 'eq. 3.1', role: 'total domestic production' },\n  'T': { meaning: 'taxes minus transfers', ref: 'eq. 3.1', role: 'reduces disposable income' },\n  'G': { meaning: 'government spending', ref: 'eq. 3.1', role: 'autonomous component of demand' },\n  'r': { meaning: 'real interest rate', ref: 'eq. 6.4', role: 'the rate that enters investment' },\n  'i': { meaning: 'nominal interest rate', ref: 'eq. 4.1 (where i enters); policy rate Ch. 4-2', role: 'policy rate set by central bank' },\n  'i_N': { meaning: 'neutral nominal interest rate', ref: 'Ch. 23', role: 'nominal rate when Y = Yₙ and π = π*' },\n  'φ': { meaning: 'Taylor rule inflation response', ref: 'Ch. 23', role: 'strength of reaction to inflation gap' },\n  'ψ': { meaning: 'Taylor rule output response', ref: 'Ch. 23', role: 'strength of reaction to output gap' },\n  'π*': { meaning: 'target inflation rate', ref: 'Ch. 23', role: 'central bank inflation goal' },\n  'Y*': { meaning: 'foreign output', ref: 'eq. 19.1', role: 'drives exports' },\n  'NX': { meaning: 'net exports', ref: 'eq. 19.1', role: 'trade balance' },\n  'C': { meaning: 'consumption', ref: 'eq. 3.3', role: 'household spending' },\n  'I': { meaning: 'investment', ref: 'eq. 5.1', role: 'firm spending' },\n  'Eᵉ': { meaning: 'expected exchange rate', ref: 'eq. 19.5', role: 'future currency value' },\n  'E': { meaning: 'nominal exchange rate', ref: 'eq. 19.5', role: 'price of domestic currency' },\n  'i*': { meaning: 'foreign nominal interest rate', ref: 'eq. 19.5', role: 'return on foreign bonds' },\n  'M/P': { meaning: 'real money demand', ref: 'eq. 5.3', role: 'liquidity preference' }\n};\n\nconst EQ_REF = {\n  'C': 'eq. 3.3',\n  'I': 'eq. 5.1 / 9.1',\n  'anchor': 'eq. 9.1',\n  'fisher': 'eq. 6.4',\n  'MD': 'eq. 5.3',\n  'MP': 'Ch. 23',\n  'PC': 'eq. 9.3 (expectations 8.7, natural rate 8.4)',\n  'UIP': 'eq. 19.5',\n  'NX': 'eq. 19.1 / 19.2'\n};\n\nfunction findSymbols(text) {\n  if (!text) return [];\n  const sortedTokens = Object.keys(SYMBOL_DEFS).sort((a, b) => b.length - a.length);\n  let t = text;\n  let matches = [];\n  for (let j = 0; j < sortedTokens.length; j++) {\n    const token = sortedTokens[j];\n    const escaped = token.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n    const isWord = /^[a-zA-Z0-9_]+$/.test(token[0]) && /^[a-zA-Z0-9_]+$/.test(token[token.length - 1]);\n    const regex = isWord \n      ? new RegExp('\\\\b' + escaped + '\\\\b', 'g') \n      : new RegExp(escaped, 'g');\n    let match;\n    while ((match = regex.exec(t)) !== null) {\n      matches.push({ token, def: SYMBOL_DEFS[token], index: match.index });\n    }\n    t = t.replace(regex, matchStr => ' '.repeat(matchStr.length));\n  }\n  return matches.sort((a, b) => a.index - b.index);\n}\n\nfunction wrapSymbols(htmlOrText) {\n  if (!htmlOrText) return '';\n  const sortedTokens = Object.keys(SYMBOL_DEFS).sort((a, b) => b.length - a.length);\n  let parts = htmlOrText.split(/(<[^>]*>)/g);\n  for (let i = 0; i < parts.length; i++) {\n    if (i % 2 === 1) continue; // skip tags\n    let t = parts[i];\n    for (let j = 0; j < sortedTokens.length; j++) {\n      const token = sortedTokens[j];\n      const escaped = token.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n      const isWord = /^[a-zA-Z0-9_]+$/.test(token[0]) && /^[a-zA-Z0-9_]+$/.test(token[token.length - 1]);\n      const regex = isWord \n        ? new RegExp('\\\\b' + escaped + '\\\\b', 'g') \n        : new RegExp(escaped, 'g');\n      t = t.replace(regex, '%%SYM' + j + '%%');\n    }\n    parts[i] = t;\n  }\n  let result = parts.join('');\n  for (let j = 0; j < sortedTokens.length; j++) {\n    const token = sortedTokens[j];\n    const def = SYMBOL_DEFS[token];\n    if (result.includes('%%SYM' + j + '%%')) {\n      const tooltip = def.meaning + '; ' + def.ref + '; ' + def.role;\n      result = result.split('%%SYM' + j + '%%').join('<span class=\"sym\" data-sym=\"' + token + '\" data-tooltip=\"' + tooltip + '\"><span class=\"sym-pop\" data-tooltip=\"' + tooltip + '\"><\u002Fspan>' + token + '<\u002Fspan>');\n    }\n  }\n  return result;\n}\n\nfunction svgTitle(textEl, label) {\n  if (typeof document === 'undefined') return;\n  if (!document.body || !document.body.classList) return;\n  if (typeof document.body.classList.contains !== 'function') return;\n  if (!document.body.classList.contains('help-mode')) return;\n\n  let text = '';\n  const found = findSymbols(label);\n  if (found.length) {\n    text = found.map(f => f.def.meaning + '; ' + f.def.ref + '; ' + f.def.role).join(' | ');\n  } else if (CURVE_DEFS[label]) {\n    const d = CURVE_DEFS[label];\n    text = d.meaning + '; ' + d.ref + '; ' + d.role;\n  }\n  if (!text) return;\n\n  textEl.setAttribute('data-tooltip', text);\n  textEl.setAttribute('data-svgtip', '1');\n}\n\nfunction wrapStaticSymbols() {\n  if (typeof document === 'undefined') return;\n  const els = document.querySelectorAll('.chart-box h3, .chart-box .sub, .legend-row span');\n  for (let i = 0; i < els.length; i++) {\n    els[i].innerHTML = wrapSymbols(els[i].innerHTML);\n  }\n}\n\nconst endLine = term => (EQ_REF[term] ? `<span class=\"eq-ref\">(${EQ_REF[term]})<\u002Fspan>` : '');\n\n// -------------------------------------------------------------------------\n// Controls\n// -------------------------------------------------------------------------\nfunction buildSliders(root, defs) {\n  defs.forEach(p => {\n    const wrap = document.createElement('div');\n    wrap.className = 'control';\n    if (p.block) wrap.setAttribute('data-block', p.block);\n    const editFmt = p.editFmt || (v => p.fmt(v).replace(/[^0-9.\\-]/g, ''));\n    const parse = p.parse || (v => v);\n    const suffix = p.suffix ? `<span class=\"val-suffix\">${p.suffix}<\u002Fspan>` : '';\n    const meter = p.meter ? `<div class=\"theta-meter\" id=\"meter-${p.key}\"><\u002Fdiv>` : '';\n    let labelHtml = String(wrapSymbols(p.label));\n    let splitIdx = labelHtml.indexOf('<span class=\"sym\"');\n    let descHtml = splitIdx !== -1 ? labelHtml.substring(0, splitIdx).trim() : labelHtml;\n    let symHtml = splitIdx !== -1 ? labelHtml.substring(splitIdx).trim() : '';\n\n    wrap.innerHTML = `\n      <label><span class=\"ctl-desc\">${descHtml} <span class=\"ctl-sym\">${symHtml}<\u002Fspan><\u002Fspan> <span class=\"val-container\"><input type=\"text\" inputmode=\"decimal\" class=\"val-edit\" id=\"val-${p.key}\" value=\"${editFmt(state[p.key])}\">${suffix}<\u002Fspan><\u002Flabel>\n      <input type=\"range\" id=\"ctl-${p.key}\" min=\"${p.min}\" max=\"${p.max}\" step=\"${p.step}\" value=\"${state[p.key]}\">\n      ${meter}\n    `;\n    root.appendChild(wrap);\n    const range = wrap.querySelector('input[type=range]');\n    const edit = wrap.querySelector('.val-edit');\n    const applyITargetGuard = () => {\n      if (p.key === 'i_target') {\n        state.i_target = Math.max(ZLB, state.i_target);\n        if (!state.taylor_on) state.i = Math.max(ZLB, state.i_target);\n        range.value = state.i_target;\n      }\n    };\n    range.addEventListener('input', e => {\n      state[p.key] = parseFloat(e.target.value);\n      applyITargetGuard();\n      edit.value = editFmt(state[p.key]);\n      render();\n    });\n    const commit = () => {\n      let raw = parse(parseFloat(edit.value));\n      if (isNaN(raw)) { edit.value = editFmt(state[p.key]); return; }\n      raw = clamp(raw, p.min, p.max);\n      state[p.key] = raw;\n      applyITargetGuard();\n      range.value = state[p.key];\n      edit.value = editFmt(state[p.key]);\n      render();\n    };\n    edit.addEventListener('change', commit);\n    edit.addEventListener('keydown', e => { if (e.key === 'Enter') edit.blur(); });\n  });\n}\n\nfunction buildControls() {\n  buildSliders(document.getElementById('controls'), paramDefs);\n  buildSliders(document.getElementById('shock-controls'), shockDefs);\n  buildSliders(document.getElementById('dynamics-controls'), dynamicsDefs);\n  buildSliders(document.getElementById('debt-controls'), debtDefs);\n  document.getElementById('speed').addEventListener('input', e => {\n    state.speed = parseFloat(e.target.value);\n    document.getElementById('speed-val').textContent = state.speed.toFixed(2);\n  });\n}\n\nfunction toggleSection(id) {\n  const sec = document.getElementById(id);\n  if (sec) sec.classList.toggle('open');\n}\n\nlet sidebarGroupByGraph = false;\n\nfunction toggleSidebarGroup() {\n  sidebarGroupByGraph = !sidebarGroupByGraph;\n  document.getElementById('sidebar-group-label').textContent = sidebarGroupByGraph ? 'Graph ▸' : 'Function ▸';\n  \n  const leftPanel = document.getElementById('left-panel');\n  const functionSections = ['sec-policy', 'sec-dynamics', 'sec-shocks', 'sec-debt'];\n  \n  if (sidebarGroupByGraph) {\n    functionSections.forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.style.display = 'none';\n    });\n    \n    const blocks = ['GOODS', 'ISLM', 'PC', 'UIP', 'DEBT'];\n    const blockNames = { 'GOODS': 'IS curve (goods)', 'ISLM': 'LM/MP curve (policy)', 'PC': 'Phillips curve & supply side', 'UIP': 'UIP curve (FX)', 'DEBT': 'Government debt' };\n    \n    blocks.forEach(b => {\n      let sec = document.getElementById('sec-graph-' + b);\n      if (!sec) {\n        sec = document.createElement('div');\n        sec.className = 'side-section open';\n        sec.id = 'sec-graph-' + b;\n        sec.innerHTML = `<div class=\"side-head\" onclick=\"toggleSection('sec-graph-${b}')\"><span class=\"side-arrow\">▶<\u002Fspan>${blockNames[b]}<\u002Fdiv><div class=\"side-body\" id=\"body-graph-${b}\"><\u002Fdiv>`;\n        leftPanel.appendChild(sec);\n      }\n      sec.style.display = 'block';\n    });\n\n    document.querySelectorAll('.control[data-block]').forEach(ctrl => {\n      if (!ctrl._originalParent) ctrl._originalParent = ctrl.parentNode;\n      const b = ctrl.getAttribute('data-block');\n      const body = document.getElementById('body-graph-' + b);\n      if (body) body.appendChild(ctrl);\n    });\n\n    const pcBody = document.getElementById('body-graph-PC');\n    const debtBody = document.getElementById('body-graph-DEBT');\n    \n    const move = (id, targetBody) => {\n      const el = document.getElementById(id);\n      if (el && targetBody) { \n        if (!el._originalParent) el._originalParent = el.parentNode; \n        targetBody.appendChild(el); \n      }\n    };\n    \n    move('speed-wrap', pcBody);\n    move('taylor-toggle', pcBody);\n    move('deanchor-toggle', pcBody);\n    move('hint-dynamics', pcBody);\n    move('oil-shock-btn', pcBody);\n    move('shock-indicator', pcBody);\n    \n    move('debt-cue', debtBody);\n    move('hint-debt', debtBody);\n\n  } else {\n    const restore = (selector) => {\n      document.querySelectorAll(selector).forEach(el => {\n        if (el._originalParent) {\n          el._originalParent.appendChild(el);\n        }\n      });\n    };\n    \n    restore('.control[data-block]');\n    ['speed-wrap', 'taylor-toggle', 'deanchor-toggle', 'hint-dynamics', 'oil-shock-btn', 'shock-indicator', 'debt-cue', 'hint-debt'].forEach(id => {\n      const el = document.getElementById(id);\n      if (el && el._originalParent) el._originalParent.appendChild(el);\n    });\n\n    functionSections.forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.style.display = 'block';\n    });\n\n    const blocks = ['GOODS', 'ISLM', 'PC', 'UIP', 'DEBT'];\n    blocks.forEach(b => {\n      const sec = document.getElementById('sec-graph-' + b);\n      if (sec) sec.style.display = 'none';\n    });\n  }\n  \n  if (typeof renderTutorial === 'function') renderTutorial();\n}\n\nfunction syncControls() {\n  const allDefs = [...paramDefs, ...shockDefs, ...dynamicsDefs, ...debtDefs];\n  allDefs.forEach(p => {\n    const inp = document.getElementById('ctl-' + p.key);\n    if (inp) inp.value = state[p.key];\n    const lbl = document.getElementById('val-' + p.key);\n    if (lbl) {\n      const editFmt = p.editFmt || (v => p.fmt(v).replace(/[^0-9.\\-]/g, ''));\n      lbl.value = editFmt(state[p.key]);\n    }\n  });\n  document.getElementById('taylor-toggle').classList.toggle('on', state.taylor_on);\n  const dt = document.getElementById('deanchor-toggle');\n  if (dt) dt.classList.toggle('on', state.deanchor_on);\n}\n\nfunction toggleHelpMode() {\n  document.body.classList.toggle('help-mode');\n  const btn = document.getElementById('btn-help-mode');\n  if (btn) btn.textContent = document.body.classList.contains('help-mode') ? '❓ Help Mode: ON' : '❓ Help Mode: OFF';\n  render();\n}\n\n\nfunction toggleTaylor() {\n  state.taylor_on = !state.taylor_on;\n  state.i = Math.max(ZLB, state.i_target)
