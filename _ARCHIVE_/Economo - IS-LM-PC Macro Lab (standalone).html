t-anchor': 'end', fill: '#635BFF', 'pointer-events': 'none' }, svg); _t.textContent = 'r (real)'; svgTitle(_t, 'r (real)'); }\n  }\n}\n\nfunction drawDrillPCChain() {\n  const eq = solve(state);\n  const z_eff = state.z + state.z_pulse;\n  const un = (state.m_struct + state.z_struct) / ALPHA_WS;\n  const Y_n = computeYn(state);\n\n  const svgA = document.getElementById('svg-drill-pc-a');\n  if (svgA) {\n    svgA.innerHTML = '';\n    const W = 160, H = 140, P = { l: 28, r: 12, t: 14, b: 28 };\n    const oA = { W, H, P, clipId: 'clip-drill-pc-a',\n      xMin: 0, xMax: 0.10, yMin: 0.80, yMax: 1.10,\n      xLabel: 'u', yLabel: 'W/P',\n      xTicks: [0, 0.05, 0.10], yTicks: [0.80, 0.95, 1.10],\n      xFmt: v => (v * 100).toFixed(0) + '%', yFmt: v => v.toFixed(2)\n    };\n    drawAxes(svgA, oA);\n    const psY = 1 / (1 + state.m_struct);\n    el('line', { x1: P.l, x2: W - P.r, y1: yScale(psY, oA), y2: yScale(psY, oA), class: 'curve curve-ps', stroke: EQ_COL.PC, 'stroke-width': '1.4' }, svgA);\n    { const _t = el('text', { x: W - P.r - 2, y: yScale(psY, oA) - 4, class: 'curve-label', 'text-anchor': 'end', fill: EQ_COL.PC, 'pointer-events': 'none' }, svgA); _t.textContent = 'PS'; svgTitle(_t, 'PS'); }\n    \n    const wsPts = [];\n    for (let u = oA.xMin; u <= oA.xMax; u += 0.01) {\n      wsPts.push([u, psY - (u - un) * ALPHA_WS]);\n    }\n    const d = wsPts.map((p, i) => (i ? 'L' : 'M') + xScale(p[0], oA).toFixed(2) + ',' + yScale(p[1], oA).toFixed(2)).join(' ');\n    el('path', { d, class: 'curve', stroke: EQ_COL.PC, 'stroke-width': '1.4', 'clip-path': `url(#${oA.clipId})` }, svgA);\n    { const endX = xScale(0.10, oA); const endY = yScale(psY - (0.10 - un) * ALPHA_WS, oA); const _t = el('text', { x: endX + 2, y: endY, class: 'curve-label', 'text-anchor': 'start', fill: EQ_COL.PC, 'pointer-events': 'none' }, svgA); _t.textContent = 'WS'; svgTitle(_t, 'WS'); }\n\n    const un_x = xScale(un, oA);\n    el('line', { x1: un_x, x2: un_x, y1: P.t, y2: H - P.b, class: 'curve-natural' }, svgA);\n    { const _t = el('text', { x: un_x + 3, y: P.t + 9, class: 'axis-label', fill: '#666' }, svgA); _t.textContent = 'uₙ'; svgTitle(_t, 'uₙ'); }\n  }\n\n  const svgB = document.getElementById('svg-drill-pc-b');\n  if (svgB) {\n    svgB.innerHTML = '';\n    const W = 160, H = 140, P = { l: 28, r: 12, t: 14, b: 28 };\n    const oB = { W, H, P, clipId: 'clip-drill-pc-b',\n      xMin: 0, xMax: 0.10, yMin: 80, yMax: 120,\n      xLabel: 'u', yLabel: 'output Y',\n      xTicks: [0, 0.05, 0.10], yTicks: [80, 100, 120],\n      xFmt: v => (v * 100).toFixed(0) + '%', yFmt: v => v.toFixed(0)\n    };\n    drawAxes(svgB, oB);\n    const okunPts = [];\n    for (let u = oB.xMin; u <= oB.xMax; u += 0.01) {\n      okunPts.push([u, L_LABOR * (1 - u)]);\n    }\n    const d = okunPts.map((p, i) => (i ? 'L' : 'M') + xScale(p[0], oB).toFixed(2) + ',' + yScale(p[1], oB).toFixed(2)).join(' ');\n    el('path', { d, class: 'curve', stroke: EQ_COL.PC, 'stroke-width': '1.4', 'clip-path': `url(#${oB.clipId})` }, svgB);\n    { const lblU = 0.085; const lblX = xScale(lblU, oB); const lblY = yScale(L_LABOR * (1 - lblU), oB) - 5; const _t = el('text', { x: lblX, y: lblY, class: 'curve-label', 'text-anchor': 'middle', fill: EQ_COL.PC, 'pointer-events': 'none' }, svgB); _t.textContent = 'Y(u)'; svgTitle(_t, 'Y = L(1−u)'); }\n\n    const un_x = xScale(un, oB);\n    el('line', { x1: un_x, x2: un_x, y1: P.t, y2: H - P.b, class: 'curve-natural' }, svgB);\n    el('circle', { cx: xScale(un, oB), cy: yScale(Y_n, oB), r: 3, class: 'eq-point' }, svgB);\n    \n    const yn_y = yScale(Y_n, oB);\n    el('line', { x1: P.l, x2: W - P.r, y1: yn_y, y2: yn_y, class: 'curve-natural' }, svgB);\n    { const _t = el('text', { x: P.l + 4, y: yn_y - 4, class: 'axis-label', fill: '#666' }, svgB); _t.textContent = 'Yₙ'; svgTitle(_t, 'Yₙ'); }\n  }\n\n  const svgC = document.getElementById('svg-drill-pc-c');\n  if (svgC) {\n    svgC.innerHTML = '';\n    const W = 160, H = 140, P = { l: 28, r: 12, t: 14, b: 28 };\n    const oC = { W, H, P, clipId: 'clip-drill-pc-c',\n      xMin: 85, xMax: 115, yMin: -0.02, yMax: 0.10,\n      xLabel: 'output Y', yLabel: 'π',\n      xTicks: [85, 100, 115], yTicks: [-0.02, 0.04, 0.10],\n      xFmt: v => (v * 100).toFixed(0) + '%' // Modified: using percentage format as requested in the oC struct but wait, original had xFmt as toFixed(0) and yFmt as (v*100).toFixed(0)+'%'. Let me preserve exactly original.\n    };\n    oC.xFmt = v => v.toFixed(0);\n    oC.yFmt = v => (v * 100).toFixed(0) + '%';\n    drawAxes(svgC, oC);\n\n    const pcPts = [];\n    for (let Y = oC.xMin; Y <= oC.xMax; Y += 1) {\n      pcPts.push([Y, state.pi_e + state.alpha * (Y - Y_n) / Y_n + z_eff]);\n    }\n    const d = pcPts.map((p, i) => (i ? 'L' : 'M') + xScale(p[0], oC).toFixed(2) + ',' + yScale(p[1], oC).toFixed(2)).join(' ');\n    el('path', { d, class: 'curve', stroke: EQ_COL.PC, 'stroke-width': '1.4', 'clip-path': `url(#${oC.clipId})` }, svgC);\n    { const endX = xScale(115, oC); const endY = yScale(state.pi_e + state.alpha * (115 - Y_n) / Y_n + z_eff, oC); const _t = el('text', { x: endX - 2, y: endY - 6, class: 'curve-label', 'text-anchor': 'end', fill: EQ_COL.PC, 'pointer-events': 'none' }, svgC); _t.textContent = 'PC'; svgTitle(_t, 'PC'); }\n\n    const yn_x = xScale(Y_n, oC);\n    el('line', { x1: yn_x, x2: yn_x, y1: P.t, y2: H - P.b, class: 'curve-natural' }, svgC);\n    { const _t = el('text', { x: yn_x + 3, y: P.t + 9, class: 'axis-label', fill: '#666' }, svgC); _t.textContent = 'Yₙ'; svgTitle(_t, 'Yₙ'); }\n    el('circle', { cx: xScale(eq.Y, oC), cy: yScale(eq.pi, oC), r: 3, class: 'eq-point' }, svgC);\n  }\n\n  const pcWSEq = document.getElementById('drill-eq-wsps');\n  const pcOkunEq = document.getElementById('drill-eq-okun');\n  const pcPhillEq = document.getElementById('drill-eq-phillips');\n  if (pcWSEq) pcWSEq.style.color = EQ_COL.PC;\n  if (pcOkunEq) pcOkunEq.style.color = EQ_COL.PC;\n  if (pcPhillEq) pcPhillEq.style.color = EQ_COL.PC;\n}\n\n// -------------------------------------------------------------------------\n// Time series chart\n// -------------------------------------------------------------------------\nfunction drawTimeSeries() {\n  const svg = document.getElementById('ts');\n  const W = 360, H = 220, P = { l: 38, r: 54, t: 14, b: 28 };\n  svg.innerHTML = '';\n\n  const eq = solve(state);\n  const hist = [...state.history, { period: state.period, ...eq, P: state.P, B: state.B }];\n  if (!hist.length) return;\n\n  const maxPeriod = Math.max(10, hist.length + 1);\n  const o = {\n    W, H, P,\n    xMin: 0, xMax: maxPeriod, yMin: 50, yMax: 150,\n    xLabel: 'period', yLabel: 'Y',\n    xTicks: Array.from({ length: 6 }, (_, i) => Math.round(i * maxPeriod / 5)),\n    yTicks: [50, 75, 100, 125, 150],\n    xFmt: v => v.toFixed(0), yFmt: v => v.toFixed(0)\n  };\n  drawAxes(svg, o);\n\n  const rateMin = -0.05, rateMax = 0.20;\n  { const _t = el('text', { x: W - P.r + 4, y: P.t + 10, class: 'axis-label', 'text-anchor': 'start' }, svg); _t.textContent = 'i, π'; svgTitle(_t, 'i, π'); }\n  [-0.05, 0, 0.05, 0.10, 0.15, 0.20].forEach(v => {\n    const y = H - P.b - (v - rateMin) / (rateMax - rateMin) * (H - P.t - P.b);\n    el('text', { x: W - P.r + 4, y: y + 3, class: 'axis-label' }, svg).textContent = (v * 100).toFixed(0) + '%';\n  });\n\n  function plot(values, color, mapY) {\n    if (values.length === 0) return;\n    if (values.length === 1) {\n      el('circle', { cx: xScale(values[0][0], o), cy: mapY(values[0][1]), r: 2.5, fill: color }, svg);\n      return;\n    }\n    const d = values.map((p, i) => (i ? 'L' : 'M') + xScale(p[0], o).toFixed(2) + ',' + mapY(p[1]).toFixed(2)).join(' ');\n    el('path', { d, class: 'ts-line', stroke: color, 'clip-path': `url(#${o.clipId})` }, svg);\n  }\n\n  const mapRate = v => H - P.b - (clamp(v, rateMin, rateMax) - rateMin) / (rateMax - rateMin) * (H - P.t - P.b);\n  const PMin = 0.8, PMax = 3.0;\n  const mapP    = v => H - P.b - (clamp(v, PMin, PMax) - PMin) / (PMax - PMin) * (H - P.t - P.b);\n  const epsMin = 0.5, epsMax = 3.0;\n  const mapEps  = v => H - P.b - (clamp(v, epsMin, epsMax) - epsMin) / (epsMax - epsMin) * (H - P.t - P.b);\n  const debtMin = 0, debtMax = 200;\n  const mapDebt = v => H - P.b - (clamp(v, debtMin, debtMax) - debtMin) / (debtMax - debtMin) * (H - P.t - P.b);\n\n  plot(hist.map(h => [h.period, h.Y]),  '#16202e', v => yScale(clamp(v, o.yMin, o.yMax), o));\n  plot(hist.map(h => [h.period, h.i]),  '#635BFF', mapRate);\n  plot(hist.map(h => [h.period, h.pi]), '#E0408E', mapRate);\n  plot(hist.map(h => [h.period, h.P]),  '#E25950', mapP);\n  plot(hist.map(h => [h.period, (h.eps !== undefined ? h.eps : 1.0)]), '#F5A623', mapEps);\n  plot(hist.map(h => [h.period, (h.B / eq.Y_n) * 100]), '#0FA9A0', mapDebt);\n\n  const yn_y = yScale(eq.Y_n, o);\n  el('line', { x1: P.l, x2: W - P.r, y1: yn_y, y2: yn_y, class: 'curve-natural' }, svg);\n}\n\n// -------------------------------------------------------------------------\n// Readout\n// -------------------------------------------------------------------------\nfunction drawReadout() {\n  const eq = solve(state);\n  const gap = ((eq.Y - eq.Y_n) / eq.Y_n) * 100;\n  const pb = state.T - state.G;\n  const debt_ratio = (state.B / eq.Y_n) * 100;\n  const stats = [\n    { label: 'Output Y',     value: eq.Y.toFixed(2),                    delta: `gap ${gap >= 0 ? '+' : ''}${gap.toFixed(2)}%`, cls: Math.abs(gap) < 0.5 ? '' : (gap > 0 ? 'pos' : 'neg') },\n    { label: 'Nominal i',    value: (eq.i * 100).toFixed(2) + '%',      delta: eq.zlb_active ? 'ZLB binds' : 'i*', cls: '' },\n    { label: 'Policy rule',  value: state.taylor_on ? 'Taylor ON' : 'Taylor OFF', delta: state.taylor_on ? `φ=${state.phi.toFixed(1)}` : '', cls: '' },\n    { label: 'Real r',       value: (eq.r * 100).toFixed(2) + '%',      delta: tutorialState.unlocked.has('PC') ? 'i−πᵉ' : '',       cls: eq.r < 0 ? 'neg' : '' },\n    { label: 'Inflation π',  value: (eq.pi * 100).toFixed(2) + '%',     delta: tutorialState.unlocked.has('PC') ? `πᵉ=${(state.pi_e * 100).toFixed(1)}%` : '', cls: '' },\n    { label: 'Nominal E',    value: eq.E.toFixed(3),                    delta: `Eᵉ=${state.E_e.toFixed(2)}`, cls: '' },\n    { label: 'Real ε',       value: eq.eps.toFixed(3),                  delta: 'E·P/P*',      cls: '' },\n    { label: 'Price P',      value: state.P.toFixed(3),                 delta: '',            cls: '' },\n    { label: 'Primary T−G',  value: pb.toFixed(1),                       delta: pb >= 0 ? 'surplus' : 'deficit',                  cls: pb >= 0 ? 'pos' : 'neg' },\n    { label: 'Debt B/Y',     value: debt_ratio.toFixed(1) + '%',         delta: '',                                              cls: debt_ratio > 100 ? 'neg' : '' }\n  ];\n  document.getElementById('readout').innerHTML = wrapSymbols(stats.map(s => `\n    <div class=\"stat\">\n      <span class=\"label\">${s.label}<\u002Fspan>\n      <span class=\"value\">${s.value}<span class=\"delta ${s.cls}\">${s.delta}<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>`).join(''));\n\n  document.getElementById('period-label').textContent = `period ${state.period}`;\n  document.getElementById('pie-readout').textContent = tutorialState.unlocked.has('PC') ? (state.pi_e * 100).toFixed(2) + '%' : '';\n  document.getElementById('istar-readout').textContent = (state.i_star * 100).toFixed(1) + '%';\n}\n\nfunction fitCharts() {\n  if (typeof document === 'undefined' || !document.querySelector) return;\n  if (document.querySelector('.eq-box.open')) return;\n  const col = document.getElementById('right-col');\n  if (!col) return;\n  \n  let h = 420; // optimistic upper bound\n  document.documentElement.style.setProperty('--chart-h', h + 'px');\n  \n  let guard = 0;\n  while (col.scrollHeight > col.clientHeight && h > 120 && guard < 60) {\n    h -= 4; guard++;\n    document.documentElement.style.setProperty('--chart-h', h + 'px');\n  }\n}\n\nwindow.addEventListener('resize', () => requestAnimationFrame(fitCharts));\n\nfunction toggleEq(boxId) {\n  const box = document.getElementById(boxId);\n  if (box) {\n    box.classList.toggle('open');\n    if (box.classList.contains('open') && typeof drawEquations === 'function' && typeof solve === 'function') {\n      drawEquations(solve(state));\n    }\n  }\n  \n  const anyOpen = document.querySelectorAll('.eq-box.open, .drill-container.open').length > 0;\n  const rightCol = document.getElementById('right-col');\n  if (anyOpen) {\n    rightCol.classList.add('eq-open');\n  } else {\n    rightCol.classList.remove('eq-open');\n  }\n  \n  fitCharts();\n}\n\nfunction drawISChips(eq) {\n  const host = document.getElementById('ismp-chips');\n  if (!host) return;\n  const chips = [];\n\n  if (eq.zlb_active && tutorialState.unlocked.has('ISLM')) {\n    chips.push({\n      cls: 'zlb',\n      msg: `Nominal interest rate is at the −0.5% floor (zero lower bound). `\n         + `Conventional rate cuts are exhausted — the central bank cannot stimulate further by lowering i.`\n    });\n  }\n\n  // Wicksellian instability: fixed nominal rate + weakly anchored adaptive\n  // expectations is a repelling equilibrium.\n  if (!state.taylor_on && state.theta < 0.65 && tutorialState.unlocked.has('PC')) {\n    chips.push({\n      cls: 'wicksell',\n      msg: `Weak anchoring (θ = ${state.theta.toFixed(2)} &lt; 0.65) with the Taylor rule off: `\n         + `small shifts in expected inflation can amplify rather than settle (Wicksellian instability). `\n         + `Raise θ or switch the Taylor rule on.`\n    });\n  }\n\n  // Anchor / credibility warning. Fires when inflation sits outside the tolerance\n  // band. With de-anchoring on, intensity tracks the credibility stock.\n  const piGap = Math.abs(eq.pi - PI_TARGET);\n  if (piGap > DEANCHOR_TOL && tutorialState.unlocked.has('PC')) {\n    if (state.deanchor_on) {\n      const lost = 1 - state.cred;\n      const sev = clamp(lost, 0, 1);\n      const mix = (a, b) => Math.round(a + (b - a) * sev);\n      const bg  = `rgb(${mix(251,176)}, ${mix(234,30)}, ${mix(234,30)})`;\n      const bd  = `rgb(${mix(230,150)}, ${mix(184,20)}, ${mix(184,20)})`;\n      const col = `rgb(${mix(154,255)}, ${mix(52,235)}, ${mix(52,235)})`;\n      chips.push({\n        cls: 'anchor',\n        style: `background:${bg};border-color:${bd};color:${col};`,\n        pulse: sev > 0.5,\n        msg: `Inflation is ${(eq.pi*100).toFixed(1)}%, outside the ±2% band around target. `\n           + `Credibility is eroding (${(state.cred*100).toFixed(0)}% of anchoring intact; effective θ = ${effectiveTheta(state).toFixed(2)}). `\n           + (sev > 0.7\n               ? `Expectations have largely come unmoored — without the rate moving to bring inflation back, this spirals.`\n               : `If inflation does not return toward target, expectations will keep de-anchoring.`)\n      });\n    } else {\n      chips.push({\n        cls: 'anchor',\n        style: `background:#fbeaea;border-color:#e6b8b8;color:#9a3434;`,\n        pulse: false,\n        msg: `Inflation is ${(eq.pi*100).toFixed(1)}%, far from the 2% target, yet expectations are held fixed (θ = ${state.theta.toFixed(2)}). `\n           + `In reality such a sustained gap would erode credibility and de-anchor expectations. `\n           + `Switch on \"Allow expectations to de-anchor\" to see the realistic dynamics.`\n      });\n    }\n  }\n\n  host.innerHTML = chips.map(c =>\n    `<div class=\"warn-chip ${c.cls}${c.pulse ? ' pulse' : ''}\" style=\"${c.style || ''}\">⚠<div class=\"chip-pop\">${c.msg}<\u002Fdiv><\u002Fdiv>`\n  ).join('');\n}\n\nfunction drawPCChips(eq) {\n  const host = document.getElementById('pc-chips');\n  if (!host) return;\n  const chips = [];\n\n  // Expectations de-anchoring: πᵉ has drifted far from target.\n  if (Math.abs(state.pi_e - PI_TARGET) > 0.01 && tutorialState.unlocked.has('PC')) {\n    chips.push({\n      cls: 'exp',\n      msg: `Expected inflation (${(state.pi_e * 100).toFixed(1)}%) has drifted from the 2% `\n         + `target — expectations are de-anchoring. Interpret with care.`\n    });\n  }\n\n  // Inflation off-target resting point: settled (small gap, no live shock) but π ≠ target.\n  const gapNow = Math.abs(eq.Y - eq.Y_n) / eq.Y_n;\n  const settled = gapNow < 0.03 && Math.abs(state.z_pulse) < 0.001;\n  if (settled && Math.abs(eq.pi - PI_TARGET) > 0.01 && tutorialState.unlocked.has('PC')) {\n    chips.push({\n      cls: 'target',\n      msg: `Inflation has settled at ${(eq.pi * 100).toFixed(1)}%, away from the 2% target — `\n         + `the economy has stopped adjusting but is not at target. This happens when policy is `\n         + `passive (Taylor rule off, or φ too low) or when i_target no longer matches the `\n         + `neutral rate (e.g. after a world-rate shift). With the Taylor rule on and φ well `\n         + `above 1, inflation returns to 2%.`\n    });\n  }\n\n  host.innerHTML = chips.map(c =>\n    `<div class=\"warn-chip ${c.cls}\">⚠<div class=\"chip-pop\">${c.msg}<\u002Fdiv><\u002Fdiv>`\n  ).join('');\n}\n\nfunction drawDebtCue(eq) {\n  const cue = document.getElementById('debt-cue');\n  if (!cue) return;\n  const g = state.g || 0;\n  const r = eq.r;\n  const d = state.B / eq.Y_n;\n  const s = (state.T - state.G) / eq.Y_n;\n  const dDot = (r - g) * d - s;\n  const rPct = (r * 100).toFixed(2), gPct = (g * 100).toFixed(2);\n  let cls, verdict;\n  if (r > g + 1e-9) {\n    cls = 'snowball';\n    verdict = `r &gt; g: the (r−g)·d term is positive, so debt tends to snowball. A primary surplus s &gt; (r−g)·d is needed just to hold the ratio steady.`;\n  } else if (g > r + 1e-9) {\n    cls = 'stable';\n    verdict = `g &gt; r: the (r−g)·d term is negative, so the ratio erodes on its own even with a modest deficit.`;\n  } else {\n    cls = 'neutral';\n    verdict = `r = g: the ratio holds steady unless the primary balance pushes it.`;\n  }\n  cue.className = 'debt-cue ' + cls;\n  cue.innerHTML =\n    `r = ${rPct}% vs g = ${gPct}% &nbsp;·&nbsp; Δd = (r−g)·d − s = `\n    + `${(dDot * 100).toFixed(2)}% per period<br>${verdict}`;\n}\n\n// -------------------------------------------------------------------------\n// Live equations panel — symbolic form, numbers substituted, computed result.\n// Terms colour-matched to the curve colours used in the charts.\n// -------------------------------------------------------------------------\nconst EQ_COL = { IS:'#E25950', MP:'#635BFF', UIP:'#0FA9A0', eps:'#F5A623',\n                 PC:'#E0408E', P:'#E25950', i:'#635BFF', pi:'#E0408E' };\n\nconst TERM_BLOCK = {\n  'anchor': 'GOODS',\n  'C': 'GOODS',\n  'I': 'ISLM',\n  'G': 'GOODS',\n  'NX': 'UIP',\n  'Y': 'GOODS',\n  'MP': 'ISLM',\n  'i': 'ISLM',\n  'UIP': 'UIP',\n  'eps': 'UIP',\n  'PC': 'PC',\n  'gap': 'PC',\n  'shock': 'PC',\n  'pi_e': 'PC',\n  'fisher': 'PC',\n  'P_prime': 'PC',\n  'P_star_prime': 'PC',\n  'Ee_prime': 'UIP'\n};\nif (typeof window !== 'undefined') window.TERM_BLOCK = TERM_BLOCK;\n\nfunction getTermCol(term) {\n  const b = TERM_BLOCK[term];\n  if (b === 'GOODS') return EQ_COL.IS;\n  if (b === 'ISLM') return (term === 'MP' || term === 'i') ? EQ_COL.MP : EQ_COL.IS;\n  if (b === 'UIP') return EQ_COL.UIP;\n  if (b === 'PC') return EQ_COL.PC;\n  return '#000';\n}\n\nfunction eqColor(txt, col) { return `<span class=\"t\" style=\"color:${col}\">${txt}<\u002Fspan>`; }\nfunction f(v, d = 2) { return Number(v).toFixed(d); }\nfunction fpc(v, d = 1) { return (v * 100).toFixed(d) + '%'; }\n\nfunction drawEquations(eq) {\n  const s = state;\n  const r = eq.i - effectivePiE(s);\n  const isUnl = term => tutorialState.unlocked.has(TERM_BLOCK[term]);\n  const c = term => getTermCol(term);\n  const lne = term => `class=\"eq-line\" style=\"color:${c(term)}\" data-term=\"${term}\"`;\n  const endLine = term => (EQ_REF[term] ? `<span class=\"eq-ref\">(${EQ_REF[term]})<\u002Fspan>` : '') + '<\u002Fspan>';\n\n  // IS-MP box: IS deviation form (with ε term) and the policy rate (MP / Taylor).\n  const ismpEl = document.getElementById('eq-ismp');\n  if (ismpEl) {\n    const c0 = 32 - 12; // c0 = 20\n    const d0 = 12;\n    const C = c0 + s.c1 * (eq.Y - s.T);\n    const I = d0 + d1 * eq.Y - d1r * eq.r;\n    const G = s.G;\n    const NX = x1 * s.Ystar - s.m1 * eq.Y - n1 * (eq.eps - 1);\n    const Cd = f(C,2), Id = f(I,2), Gd = f(G,2), NXd = f(NX,2);\n    \n    const showNX = openOn();\n    const showPC = isUnl('fisher');\n    const rateSym = showPC ? 'r' : 'i';\n\n    const totalShown = showNX \n      ? (Number(Cd) + Number(Id) + Number(Gd) + Number(NXd)).toFixed(2)\n      : (Number(Cd) + Number(Id) + Number(Gd)).toFixed(2);\n    const anchorSym = showNX ? 'Y = C + I + G + NX' : 'Y = C + I + G';\n    const totalAddends = showNX ? `${Cd} + ${Id} + ${Gd} + ${NXd}` : `${Cd} + ${Id} + ${Gd}`;\n\n    const nxLine = (showNX && isUnl('NX')) ?\n        `<span ${lne('NX')}><span class=\"eq-lbl\">NX<\u002Fspan>`\n      + `<span class=\"eq-sym\">x₁·Y* − m₁·Y − n₁·(ε−1)<\u002Fspan> = `\n      + `<span class=\"eq-num\">${f(x1,2)}(${f(s.Ystar,0)}) − ${f(s.m1,2)}(${f(eq.Y,1)}) − ${n1}(${f(eq.eps,3)}−1)<\u002Fspan> `\n      + `= <span class=\"eq-res\">${NXd}<\u002Fspan>${endLine('NX')}`\n      : '';\n\n    let mpLine = '';\n    if (isUnl('MP')) {\n      if (s.taylor_on) {\n        const gap = (eq.Y - eq.Y_n) / eq.Y_n;\n        const neutral_r = isRateForOutput(eq.Y_n, s.G, s.T, eq.eps, PI_TARGET, s.c1, s.m1, s.Ystar) - PI_TARGET;\n        const neutral_i = neutral_r + PI_TARGET;\n        mpLine =\n          `<span ${lne('MP')}><span class=\"eq-lbl\">LM<\u002Fspan>`\n          + `<span class=\"eq-sym\">i_N + φ(π−π*) + ψ·gap<\u002Fspan> = `\n          + `<span class=\"eq-num\">${fpc(neutral_i,1)} + ${f(s.phi,1)}(${fpc(eq.pi-PI_TARGET,1)}) + 0.25(${fpc(gap,1)})<\u002Fspan> `\n          + `= <span class=\"eq-res\">${fpc(eq.i,2)}<\u002Fspan>${endLine('MP')}`;\n      } else {\n        mpLine =\n          `<span ${lne('MP')}><span class=\"eq-lbl\">LM<\u002Fspan>`\n          + `<span class=\"eq-sym\">i = i_target (horizontal)<\u002Fspan> `\n          + `= <span class=\"eq-res\">${fpc(eq.i,2)}<\u002Fspan>${endLine('MP')}`;\n      }\n    }\n\n    ismpEl.innerHTML = wrapSymbols(\n      `<span class=\"eq-line eq-anchor\" style=\"color:${c('anchor')}\" data-term=\"anchor\"><span class=\"eq-lbl\"><\u002Fspan>`\n      + `<span class=\"eq-sym\">${anchorSym}<\u002Fspan>${endLine('anchor')}<\u002Fspan>`\n      + (isUnl('C') ? `<span ${lne('C')}><span class=\"eq-lbl\">C<\u002Fspan>`\n      + `<span class=\"eq-sym\">c₀ + c₁(Y−T)<\u002Fspan> = `\n      + `<span class=\"eq-num\">${c0} + ${f(s.c1,2)}(${f(eq.Y,1)}−${f(s.T,0)})<\u002Fspan> `\n      + `= <span class=\"eq-res\">${Cd}<\u002Fspan>${endLine('C')}<\u002Fspan>` : '')\n      + (isUnl('I') ? `<span ${lne('I')}><span class=\"eq-lbl\">I<\u002Fspan>`\n      + `<span class=\"eq-sym\">d₀ + d₁·Y − d₁ᵣ·${rateSym}<\u002Fspan> = `\n      + `<span class=\"eq-num\">${d0} + ${f(d1,2)}(${f(eq.Y,1)}) − ${d1r}(${f(r,4)})<\u002Fspan> `\n      + `= <span class=\"eq-res\">${Id}<\u002Fspan>${endLine('I')}<\u002Fspan>` : '')\n      + (isUnl('G') ? `<span ${lne('G')}><span class=\"eq-lbl\">G<\u002Fspan>`\n      + `<span class=\"eq-sym\">government spending<\u002Fspan> `\n      + `= <span class=\"eq-res\">${Gd}<\u002Fspan>${endLine('G')}<\u002Fspan>` : '')\n      + nxLine\n      + (isUnl('Y') ? `<span class=\"eq-line eq-total\" style=\"color:${c('Y')}\" data-term=\"Y\"><span class=\"eq-lbl\">Y<\u002Fspan>`\n      + `<span class=\"eq-num\">${totalAddends}<\u002Fspan> `\n      + `= <span class=\"eq-res\">${totalShown}<\u002Fspan>${endLine('Y')}<\u002Fspan>` : '')\n      + mpLine\n    );\n  }\n\n  // UIP box: nominal E identity and real ε = E·P/P*.\n  const uipEl = document.getElementById('eq-uip');\n  if (uipEl) {\n    if (isUnl('UIP')) {\n      uipEl.innerHTML = wrapSymbols(\n        `<span ${lne('UIP')}><span class=\"eq-lbl\">UIP<\u002Fspan>`\n        + `<span class=\"eq-sym\">E = Eᵉ(1+i)/(1+i*)<\u002Fspan><\u002Fspan>`\n        + `<span ${lne('UIP')}><span class=\"eq-lbl\"><\u002Fspan><span class=\"eq-num\">= `\n        + `${f(s.E_e,3)}(1+${fpc(eq.i,2)})/(1+${fpc(s.i_star,2)})<\u002Fspan> `\n        + `= <span class=\"eq-res\">${f(eq.E,3)}<\u002Fspan>${endLine('UIP')}<\u002Fspan>`\n        + (isUnl('eps') ? \n          `<span ${lne('eps')}><span class=\"eq-lbl\">ε<\u002Fspan>`\n          + `<span class=\"eq-sym\">E·P/P*<\u002Fspan> = `\n          + `<span class=\"eq-num\">${f(eq.E,3)}·${f(s.P,3)}/${f(s.P_star || 1,3)}<\u002Fspan> `\n          + `= <span class=\"eq-res\">${f(eq.eps,3)}<\u002Fspan>${endLine('eps')}<\u002Fspan>` : '')\n      );\n    } else {\n      uipEl.innerHTML = '';\n    }\n  }\n\n  // Phillips curve box.\n  const pcEl = document.getElementById('eq-pc');\n  if (pcEl) {\n    if (isUnl('PC')) {\n      const gap = (eq.Y - eq.Y_n) / eq.Y_n;\n      const un = (s.m_struct + s.z_struct) / ALPHA_WS;\n      pcEl.innerHTML = wrapSymbols(\n        `<span ${lne('PC')}><span class=\"eq-lbl\">uₙ<\u002Fspan>`\n        + `<span class=\"eq-sym\">(m+z)/α_WS<\u002Fspan> = `\n        + `<span class=\"eq-num\">(${f(s.m_struct,2)} + ${f(s.z_struct,2)})/${ALPHA_WS}<\u002Fspan> `\n        + `= <span class=\"eq-res\">${fpc(un,1)}<\u002Fspan>${endLine('PC')}<\u002Fspan>`\n        + `<span ${lne('PC')}><span class=\"eq-lbl\">Yₙ<\u002Fspan>`\n        + `<span class=\"eq-sym\">L(1−uₙ)<\u002Fspan> = `\n        + `<span class=\"eq-num\">${L_LABOR}(1−${fpc(un,1)})<\u002Fspan> `\n        + `= <span class=\"eq-res\">${f(eq.Y_n,0)}<\u002Fspan>${endLine('PC')}<\u002Fspan>`\n        + `<span ${lne('PC')}><span class=\"eq-lbl\">PC<\u002Fspan>`\n        + `<span class=\"eq-sym\">π = πᵉ + α(Y−Yₙ)/Yₙ + shock<\u002Fspan><\u002Fspan>`\n        + `<span ${lne('PC')}><span class=\"eq-lbl\"><\u002Fspan><span class=\"eq-num\">= `\n        + `${fpc(s.pi_e,1)} + ${f(s.alpha,2)}·(${f(eq.Y,1)}−${f(eq.Y_n,0)})/${f(eq.Y_n,0)} `\n        + `+ ${fpc(eq.z_eff,2)}<\u002Fspan> `\n        + `= <span class=\"eq-res\">${fpc(eq.pi,1)}<\u002Fspan>${endLine('PC')}<\u002Fspan>`\n        + (isUnl('gap') ? \n          `<span ${lne('gap')}><span class=\"eq-lbl\">gap<\u002Fspan>`\n          + `<span class=\"eq-num\">(Y−Yₙ)/Yₙ = ${fpc(gap,1)}<\u002Fspan><\u002Fspan>` : '')\n      );\n    } else {\n      pcEl.innerHTML = '';\n    }\n  }\n\n  // Time-series box: the dynamic identities driving each step.\n  const tsEl = document.getElementById('eq-ts');\n  if (tsEl) {\n    const E_e_next = (1 - 0.4*s.speed)*s.E_e + 0.4*s.speed*eq.E;\n    let html = '';\n    if (isUnl('fisher')) {\n      html += `<span ${lne('fisher')}><span class=\"eq-lbl\">Fisher<\u002Fspan>`\n        + `<span class=\"eq-sym\">r = i − πᵉ<\u002Fspan> = `\n        + `<span class=\"eq-num\">${fpc(eq.i,2)} − ${fpc(s.pi_e,1)}<\u002Fspan> `\n        + `= <span class=\"eq-res\">${fpc(r,2)}<\u002Fspan><\u002Fspan>`;\n    }\n    if (isUnl('P_prime')) {\n      html += `<span ${lne('P_prime')}><span class=\"eq-lbl\">P′<\u002Fspan>`\n        + `<span class=\"eq-sym\">P(1 + π·speed)<\u002Fspan> = `\n        + `<span class=\"eq-num\">${f(s.P,3)}(1 + ${fpc(eq.pi,1)}·${f(s.speed,2)})<\u002Fspan> `\n        + `= <span class=\"eq-res\">${f(s.P*(1+eq.pi*s.speed),3)}<\u002Fspan><\u002Fspan>`;\n    }\n    if (isUnl('P_star_prime') && openOn()) {\n      html += `<span ${lne('P_star_prime')}><span class=\"eq-lbl\">P*′<\u002Fspan>`\n        + `<span class=\"eq-sym\">P*(1 + π*·speed)<\u002Fspan> = `\n        + `<span class=\"eq-num\">${f(s.P_star || 1,3)}(1 + ${fpc(PI_TARGET,1)}·${f(s.speed,2)})<\u002Fspan> `\n        + `= <span class=\"eq-res\">${f((s.P_star || 1)*(1+PI_TARGET*s.speed),3)}<\u002Fspan> (foreign)<\u002Fspan>`;\n    }\n    if (isUnl('Ee_prime') && openOn()) {\n      html += `<span ${lne('Ee_prime')}><span class=\"eq-lbl\">Eᵉ′<\u002Fspan>`\n        + `<span class=\"eq-sym\">(1−0.4·sp)Eᵉ + 0.4·sp·E<\u002Fspan> = `\n        + `<span class=\"eq-num\">(1−0.4·${f(s.speed,2)})(${f(s.E_e,3)}) + 0.4·${f(s.speed,2)}(${f(eq.E,3)})<\u002Fspan> `\n        + `= <span class=\"eq-res\">${f(E_e_next,3)}<\u002Fspan> (adaptive)<\u002Fspan>`;\n    }\n    tsEl.innerHTML = html;\n  }\n}\n\n// -------------------------------------------------------------------------\n// Master render\n// -------------------------------------------------------------------------\nfunction render() {\n  const eq = solve(state);\n  document.body.classList.toggle('zlb-active', eq.zlb_active);\n\n  // ZLB warning now renders as a hover chip inside the IS-MP plot.\n  drawISChips(eq);\n\n  // Inflation warnings render as hover chips inside the Phillips curve plot.\n  drawPCChips(eq);\n\n  drawISMP();\n  drawUIP();\n  drawPC();\n  drawTimeSeries();\n  drawReadout();\n  drawEquations(eq);\n  drawDebtCue(eq);\n  updateShockIndicator();\n  updateReverseButton();\n  updateCredMeter(eq);\n  renderTutorial();\n  redrawOpenDrills();\n}\n\nfunction redrawOpenDrills() {\n  if (document.getElementById('drill-is')?.classList.contains('open'))  drawDrillIS();\n  if (document.getElementById('drill-mp')?.classList.contains('open'))  drawDrillMP();\n  if (document.getElementById('drill-uip')?.classList.contains('open') && typeof drawDrillUIP === 'function') drawDrillUIP();\n  if (document.getElementById('drill-pc')?.classList.contains('open'))  drawDrillPCChain();\n}\n\nfunction updateReverseButton() {\n  const btn = document.getElementById('reverse-btn');\n  if (!btn) return;\n  btn.disabled = undoStack.length === 0;\n  btn.textContent = undoStack.length > 0 ? `← Reverse (${undoStack.length})` : '← Reverse';\n}\n\n// One-line readout under the credibility slider: the effective anchoring that\n// actually drives expectations, which is the cap (θ) times current credibility.\n// Reddens as credibility falls; shows whether it's eroding or recovering.\nfunction updateCredMeter(eq) {\n  const m = document.getElementById('meter-cred');\n  if (!m) return;\n  const eff = effectiveTheta(state);\n  const lost = clamp(1 - state.cred, 0, 1);\n  const mix = (a, b) => Math.round(a + (b - a) * lost);\n  const col = `rgb(${mix(15,192)}, ${mix(110,57)}, ${mix(86,43)})`;   // green → red\n  let trend = '';\n  if (state.deanchor_on) {\n    const gap = Math.abs(eq.pi - PI_TARGET);\n    if (gap > DEANCHOR_TOL && state.cred > 0) trend = ' · eroding ↓';\n    else if (gap <= DEANCHOR_TOL && state.cred < 1) trend = ' · rebuilding ↑';\n  } else {\n    trend = ' · fixed (de-anchoring off)';\n  }\n  m.innerHTML =\n    `<div class=\"tm-row\"><span>effective θ = cap × credibility = `\n    + `<strong style=\"color:${col}\">${eff.toFixed(2)}<\u002Fstrong>${trend}<\u002Fspan><\u002Fdiv>`;\n}\n\n// -------------------------------------------------------------------------\n// Time controls\n// -------------------------------------------------------------------------\nfunction stepPeriod() {\n  undoStack.push(clone(state));\n  state = step(state);\n  syncControls(); render();\n}\n\nfunction jumpLongRun() {\n  undoStack.push(clone(state));\n  for (let k = 0; k < 600; k++) {\n    const eq = solve(state);\n    if (Math.abs(eq.Y - eq.Y_n) / eq.Y_n < 0.001 &&\n        Math.abs(eq.pi - state.pi_e) < 0.0005 &&\n        Math.abs(state.z_pulse) < 0.0005) break;\n    state = step(state);\n  }\n  syncControls(); render();\n}\n\nfunction advanceTutorial() {\n  if (tutorialState.stage < TUTORIAL_STAGES.length - 1) {\n    goToStage(tutorialState.stage + 1);\n  }\n}\n\nrenderTutorial = function() {\n  const isUnlocked = b => tutorialState.unlocked.has(b);\n  const uipActive = openOn();\n  \n  const setLocked = (selector, condition) => {\n    document.querySelectorAll(selector).forEach(el => {\n      if (condition) el.classList.remove('locked');\n      else el.classList.add('locked');\n    });\n  };\n\n  // UI button and dropdown state\n  const btnAdv = document.getElementById('btn-advance');\n  if (btnAdv) {\n    btnAdv.disabled = tutorialState.stage >= TUTORIAL_STAGES.length - 1;\n  }\n\n  const stageDropdown = document.getElementById('stage-dropdown');\n  if (stageDropdown && stageDropdown.options) {\n    if (stageDropdown.options.length === 0) {\n      TUTORIAL_STAGES.forEach((st, i) => {\n        const opt = document.createElement('option');\n        opt.value = i;\n        opt.textContent = st.label;\n        stageDropdown.appendChild(opt);\n      });\n    }\n    stageDropdown.value = tutorialState.stage;\n  }\n\n  // Visual lock/grey/colour-in for each block\n  const goodsOn = isUnlocked('GOODS');\n  setLocked('.control[data-block=\"GOODS\"]', goodsOn);\n  setLocked('.curve-is, .label-is, .handle[data-handle=\"is\"]', goodsOn);\n\n  const islmOn = isUnlocked('ISLM');\n  setLocked('.control[data-block=\"ISLM\"]', islmOn);\n  setLocked('.curve-mp, .curve-real, .label-mp, .handle[data-handle=\"mp\"]', islmOn);\n\n  setLocked('.control[data-block=\"UIP\"]', uipActive);\n  setLocked('#chart-box-uip, .curve-uip, .label-uip, .handle[data-handle=\"uip\"], #drill-uip', uipActive);\n\n  const pcOn = isUnlocked('PC');\n  setLocked('.control[data-block=\"PC\"]', pcOn);\n  setLocked('#chart-box-pc, .curve-pc, .label-pc', pcOn);\n  setLocked('#sec-dynamics .side-body', pcOn);\n  setLocked('#sec-shocks .side-body', pcOn);\n\n  const debtOn = isUnlocked('DEBT');\n  setLocked('.control[data-block=\"DEBT\"]', debtOn);\n  setLocked('.debt-cue, #ts path[stroke=\"#0FA9A0\"], #ts circle[fill=\"#0FA9A0\"]', debtOn);\n\n  // Drill triggers gating (INV-S3-C)\n  setLocked('.drill-trigger[data-block=\"ISLM\"]', islmOn);\n  setLocked('.drill-trigger[data-block=\"UIP\"]', uipActive);\n  setLocked('.drill-trigger[data-block=\"PC\"]', pcOn);\n};\n\nfunction reverseStep() {\n  if (undoStack.length === 0) return;\n  state = undoStack.pop();\n  syncControls();\n  render();\n}\n\nfunction reset() {\n  const sp = parseFloat(document.getElementById('speed').value);\n  state = clone(initialState);\n  state.speed = sp;\n  undoStack = [];\n  syncControls();\n  render();\n}\n\nfunction applyOilShock() {\n  state.z_pulse += OIL_SHOCK;\n  render();\n}\n\n// -------------------------------------------------------------------------\n// Preset scenario library\n// -------------------------------------------------------------------------\nconst SCENARIOS = [\n  {\n    id: 'taylorPrinciple',\n    label: '1. The Taylor Principle',\n    narrative: 'Taylor rule ON with φ = 1.5 and partially-anchored expectations (θ=0.25), so expectations can actually move. Apply the oil shock and step: with φ = 1.5 the bank responds more than one-for-one and inflation comes smoothly back to the 2% target within the medium run. Then—without resetting—lower φ to 0.5 and shock again. Now the bank is too passive: the economy overshoots into deflation, the rate is cut nearly to zero, expectations de-anchor (watch the warning chip), and the return to target takes far longer and oscillates. The contrast between the two φ settings is the Taylor principle.',\n    state: { G: 20, T: 20, P: 1.0, P_star: 1.0, i_target: 0.03, i: 0.03, i_star: 0.03, E_e: 1.0, pi_e: 0.02, Y_n: 100, alpha: 0.5, z: 0, z_pulse: 0, theta: 0.25, cred: 1.0, deanchor_on: false, phi: 1.5, taylor_on: true, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  },\n  {\n    id: 'expectationsDeAnchored',\n    label: '2a. De-Anchored Expectations (1970s)',\n    narrative: 'θ = 1: expectations are purely adaptive and start at 8%. A transitory cost-push shock (z_pulse = +2%) hits. Disinflation requires a painful recession because the central bank must drag πᵉ down by brute force. Since the shock is transitory, output eventually returns to exactly potential (100). Permanent supply shocks have no stationary equilibrium in the open economy under naive exchange-rate expectations (Blanchard Ch. 20).',\n    state: { G: 20, T: 20, P: 1.0, P_star: 1.0, i_target: 0.03, i: 0.03, i_star: 0.03, E_e: 1.0, pi_e: 0.08, m_struct: 0.05, z_struct: 0.10, alpha: 0.3, z: 0, z_pulse: 0.02, theta: 1, cred: 1.0, deanchor_on: true, phi: 1.5, taylor_on: true, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  },\n  {\n    id: 'expectationsAnchored',\n    label: '2b. Anchored Expectations (1990s)',\n    narrative: 'θ = 1: credibility is absolute. The same persistent cost-push shock (z = 2%) barely ripples—πᵉ stays nailed to the 2% target, and the adjustment is far smoother than in 2a even though the permanent shock carries the same lasting output cost. Use this side-by-side with preset 2a to show why central-bank credibility is a policy tool.',\n    state: { G: 20, T: 20, P: 1.0, P_star: 1.0, i_target: 0.03, i: 0.03, i_star: 0.03, E_e: 1.0, pi_e: 0.02, Y_n: 100, alpha: 0.5, z: 0.02, z_pulse: 0, theta: 1, cred: 1.0, deanchor_on: false, phi: 1.5, taylor_on: true, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  },\n  {\n    id: 'exchangeRateDisinflation',\n    label: '3. Exchange-Rate Disinflation',\n    narrative: 'Taylor OFF, expectations mostly anchored (θ=0.7). Cut the policy rate to 1%. UIP triggers a nominal depreciation; net exports surge and Y rises above Yₙ. Over time prices climb relative to foreign, the real exchange rate appreciates, and Y drifts back. A temporary stimulus from a weak currency — and because i is held below i* indefinitely, inflation settles slightly above 2% rather than at it.',\n    state: { G: 20, T: 20, P: 1.0, P_star: 1.0, i_target: 0.01, i: 0.01, i_star: 0.03, E_e: 1.0, pi_e: 0.02, Y_n: 100, alpha: 0.5, z: 0, z_pulse: 0, theta: 0.7, cred: 1.0, deanchor_on: false, phi: 1.5, taylor_on: false, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  },\n  {\n    id: 'twinDeficits',\n    label: '4. Twin Deficits & Real Appreciation',\n    narrative: 'Taylor OFF, expectations mostly anchored (θ=0.7). A modest fiscal expansion (G raised from 20 to 22, a 10% rise) with no monetary offset drives up domestic prices. The real exchange rate appreciates, crowding out net exports until Y returns to Yₙ and inflation returns to 2% — leaving ε permanently higher (≈1.04). Watch ε climb on the time series.',\n    state: { G: 22, T: 20, P: 1.0, P_star: 1.0, i_target: 0.03, i: 0.03, i_star: 0.03, E_e: 1.0, pi_e: 0.02, Y_n: 100, alpha: 0.5, z: 0, z_pulse: 0, theta: 0.7, cred: 1.0, deanchor_on: false, phi: 1.5, taylor_on: false, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  },\n  {\n    id: 'globalRateHike',\n    label: '5. Global Rate Hike Spillover',\n    narrative: 'Foreign rates jump to 6%. UIP wants a weaker domestic currency unless the CB matches the hike. With Taylor ON, the domestic rule sees the inflationary depreciation and hikes i. The economy converges to a higher domestic rate with a persistently weaker nominal E — and because i_target still embodies the old neutral rate, inflation settles somewhat above 2%. Raise i_target toward the new world rate to bring it home: a stale-intercept lesson.',\n    state: { G: 20, T: 20, P: 1.0, P_star: 1.0, i_target: 0.03, i: 0.03, i_star: 0.06, E_e: 1.0, pi_e: 0.02, Y_n: 100, alpha: 0.5, z: 0, z_pulse: 0, theta: 0, cred: 1.0, deanchor_on: true, phi: 1.5, taylor_on: true, speed: 0.5, B: 0, g: 0.02, period: 0, history: [] }\n  }\n];\n\nfunction buildScenarioDropdown() {\n  const select = document.getElementById('scenario-select');\n  const def = document.createElement('option');\n  def.value = '';\n  def.textContent = '-- Choose a scenario --';\n  select.appendChild(def);\n  SCENARIOS.forEach(s => {\n    const opt = document.createElement('option');\n    opt.value = s.id;\n    opt.textContent = s.label;\n    select.appendChild(opt);\n  });\n}\n\nfunction previewScenario(id) {\n  const note = document.getElementById('scenario-narrative');\n  const btn = document.getElementById('scenario-load-btn');\n  if (!id) {\n    note.textContent = 'Select a scenario to see its description.';\n    btn.disabled = true;\n    return;\n  }\n  const preset = SCENARIOS.find(s => s.id === id);\n  if (preset) {\n    note.textContent = preset.narrative;\n    btn.disabled = false;\n  }\n}\n\nfunction applySelectedScenario() {\n  const select = document.getElementById('scenario-select');\n  const id = select.value;\n  if (!id) return;\n  applyScenario(id);\n}\n\nfunction applyScenario(id) {\n  const preset = SCENARIOS.find(s => s.id === id);\n  if (!preset) return;\n  state = Object.assign(clone(initialState), clone(preset.state));\n  undoStack = [];\n  syncControls();\n  render();\n}\n\n// -------------------------------------------------------------------------\n// Copy state export\n// -------------------------------------------------------------------------\nfunction formatStateExport() {\n  const eq = solve(state);\n  const pad = (s, n) => String(s).padStart(n);\n  const pct = (v, d = 2) => (v * 100).toFixed(d) + '%';\n  const L = [];\n  L.push('═══════════════════════════════════════════════════════════════');\n  L.push('  ISLM-UIP-PC Model · State export (v19, open economy)');\n  L.push(`  Period ${state.period} · Taylor ${state.taylor_on ? 'ON' : 'OFF'} · cred=${state.cred.toFixed(2)}`);\n  L.push('═══════════════════════════════════════════════════════════════');\n  L.push('');\n  L.push('POLICY & EXOGENOUS');\n  L.push(`  G = ${state.G.toFixed(1)}   T = ${state.T.toFixed(1)}   (T−G = ${(state.T - state.G).toFixed(1)})`);\n  L.push(`  i_target = ${pct(state.i_target)}   i* = ${pct(state.i_star)}`);\n  L.push(`  E_e = ${state.E_e.toFixed(3)}   π_e = ${pct(state.pi_e)}`);\n  L.push(`  Y_n = ${eq.Y_n.toFixed(1)}   α = ${state.alpha.toFixed(2)}`);\n  L.push('');\n  L.push('SHOCKS');\n  L.push(`  z (persistent) = ${pct(state.z)}   z_pulse = ${pct(state.z_pulse, 3)}`);\n  L.push('');\n  L.push('DYNAMICS');\n  L.push(`  θ (ceiling) = ${state.theta.toFixed(2)}   cred = ${state.cred.toFixed(2)}   eff θ = ${(state.theta * state.cred).toFixed(2)}`);\n  L.push(`  φ (Taylor) = ${state.phi.toFixed(1)}   speed = ${state.speed.toFixed(2)}   deanchor = ${state.deanchor_on ? 'ON' : 'OFF'}`);\n  L.push('');\n  L.push('CURRENT EQUILIBRIUM');\n  L.push(`  Y = ${eq.Y.toFixed(2)}   (gap ${((eq.Y - eq.Y_n) / eq.Y_n * 100).toFixed(2)}%)`);\n  L.push(`  i = ${pct(eq.i)}   r = ${pct(eq.r)}   (Fisher)`);\n  L.push(`  π = ${pct(eq.pi)}   P = ${state.P.toFixed(3)}   P* = ${(state.P_star || 1).toFixed(3)}`);\n  L.push(`  E = ${eq.E.toFixed(3)}   ε = ${eq.eps.toFixed(3)}`);\n  L.push('');\n  L.push('FISCAL');\n  L.push(`  Primary balance T−G = ${(state.T - state.G).toFixed(1)}`);\n  L.push(`  Debt B = ${state.B.toFixed(2)}   B/Y_n = ${(state.B / eq.Y_n * 100).toFixed(1)}%`);\n  L.push('');\n  L.push('HISTORY');\n  if (state.history.length === 0) {\n    L.push('  (no periods stepped yet)');\n  } else {\n    L.push('  ' + pad('Period', 6) + ' | ' + pad('Y', 7) + ' | ' + pad('i', 7) + ' | ' + pad('π', 7) + ' | ' + pad('π_e', 7) + ' | ' + pad('P', 7) + ' | ' + pad('E', 6) + ' | ' + pad('eps', 6));\n    L.push('  ' + '─'.repeat(78));\n    state.history.forEach(h => {\n      L.push('  ' + pad(h.period, 6) + ' | ' +\n        pad(h.Y.toFixed(2), 7) + ' | ' +\n        pad((h.i * 100).toFixed(2) + '%', 7) + ' | ' +\n        pad((h.pi * 100).toFixed(2) + '%', 7) + ' | ' +\n        pad((h.pi_e * 100).toFixed(2) + '%', 7) + ' | ' +\n        pad(h.P.toFixed(3), 7) + ' | ' +\n        pad(h.E.toFixed(3), 6) + ' | ' +\n        pad(h.eps.toFixed(3), 6));\n    });\n  }\n  L.push('═══════════════════════════════════════════════════════════════');\n  return L.join('\\n');\n}\n\nasync function copyState() {\n  const text = formatStateExport();\n  const btn = document.getElementById('copy-btn');\n  const orig = btn.textContent;\n  try {\n    await navigator.clipboard.writeText(text);\n    btn.textContent = '✓ Copied!';\n  } catch (err) {\n    const ta = document.createElement('textarea');\n    ta.value = text;\n    ta.style.position = 'fixed'; ta.style.opacity = '0';\n    document.body.appendChild(ta);\n    ta.select();\n    try { document.execCommand('copy'); btn.textContent = '✓ Copied!'; }\n    catch { window.prompt('Copy this text:', text); btn.textContent = orig; }\n    document.body.removeChild(ta);\n  }\n  setTimeout(() => { btn.textContent = orig; }, 1500);\n}\n\n// -------------------------------------------------------------------------\n// Boot\n// -------------------------------------------------------------------------\n\nif (typeof document !== 'undefined' && document.addEventListener) {\n  wrapStaticSymbols();\n  \n  document.addEventListener('mouseover', e => {\n    if (!document.body.classList.contains('help-mode')) return;\n    const sym = e.target.closest('.sym');\n    if (sym) {\n      const pop = sym.querySelector('.sym-pop');\n      if (!pop) return;\n\n      const rect = sym.getBoundingClientRect();\n      pop.style.display = 'block';\n      const popRect = pop.getBoundingClientRect();\n      \n      let top = rect.bottom + 4;\n      let left = rect.left;\n      \n      if (left + popRect.width > window.innerWidth) {\n        left = window.innerWidth - popRect.width - 10;\n      }\n      if (top + popRect.height > window.innerHeight) {\n        top = rect.top - popRect.height - 4;\n      }\n      \n      pop.style.top = top + 'px';\n      pop.style.left = Math.max(10, left) + 'px';\n      return;\n    }\n\n    const svgLabel = e.target.closest('[data-svgtip]');\n    if (!svgLabel || !svgLabel.getAttribute('data-tooltip')) return;\n    const pop = document.getElementById('svg-tooltip');\n    if (!pop) return;\n    pop.setAttribute('data-tooltip', svgLabel.getAttribute('data-tooltip'));\n    const rect = svgLabel.getBoundingClientRect();\n    pop.style.display = 'block';\n    const popRect = pop.getBoundingClientRect();\n    let top = rect.bottom + 4, left = rect.left;\n    if (left + popRect.width > window.innerWidth) left = window.innerWidth - popRect.width - 10;\n    if (top + popRect.height > window.innerHeight) top = rect.top - popRect.height - 4;\n    pop.style.top = top + 'px';\n    pop.style.left = Math.max(10, left) + 'px';\n  });\n\n  document.addEventListener('mouseout', e => {\n    const sym = e.target.closest('.sym');\n    if (sym) {\n      if (e.relatedTarget && sym.contains(e.relatedTarget)) return;\n      const pop = sym.querySelector('.sym-pop');\n      if (pop) pop.style.display = 'none';\n    }\n\n    const svgLabel = e.target.closest('[data-svgtip]');\n    if (svgLabel) {\n      const pop = document.getElementById('svg-tooltip');\n      if (pop) pop.style.display = 'none';\n    }\n  });\n}\n\nbuildControls();\ninitDragManager();\nbuildScenarioDropdown();\nsyncControls();\nrender();\nif (typeof requestAnimationFrame !== 'undefined') {\n  requestAnimationFrame(fitCharts);\n} else {\n  fitCharts();\n}\n\n\n// ═══════════════════ SELF-TESTS (run on load) ═══════════════════\n(function runSelfTests() {\n  const results = [];\n  const assert = (name, cond) => {\n    results.push({ name, pass: !!cond });\n    console.log(`[SELF-TEST] ${cond ? 'PASS' : '*** FAIL ***'}: ${name}`);\n  };\n  const near = (a, b, tol = 1e-9) => Math.abs(a - b) < tol;\n\n  const Y_bl = isOutput(IS_G_BASE, IS_T_BASE, IS_R_BASE, IS_EPS_BASE, 0.5, 0.30, YSTAR_BASE);\n  assert('Baseline isOutput = IS_Y_BASE', near(Y_bl, IS_Y_BASE));\n\n  const testY = 105;\n  const r_inv  = isRateForOutput(testY, IS_G_BASE, IS_T_BASE, IS_EPS_BASE, PI_TARGET, 0.5, 0.30, YSTAR_BASE);\n  const r_real = r_inv - PI_TARGET;\n  const Y_rt   = isOutput(IS_G_BASE, IS_T_BASE, r_real, IS_EPS_BASE, 0.5, 0.30, YSTAR_BASE);\n  assert('Round-trip Y → r → Y', near(Y_rt, testY));\n\n  const kC = 1/(1 - 0.5 - 0.1), kO = 1/(1 - 0.5 - 0.1 + 0.30);\n  assert('k_o < k_closed for m1>0', kO < kC);\n\n  // Taylor convergence is a PC-regime (medium-run) property — the Taylor rule\n  // and time-controls are gated to PC in the UI, so test it in that regime.\n  const _savedUnlocked = tutorialState.unlocked;\n  tutorialState.unlocked = new Set(['GOODS','ISLM','UIP','PC']);\n\n  let s = JSON.parse(JSON.stringify(initialState));\n  s.taylor_on = true; s.G = 21;\n  const Yn0 = computeYn(s);\n  for (let t = 0; t < 60; t++) s = step(s);\n  assert('Taylor convergence (60 periods)', Math.abs(solve(s).Y - Yn0) < 0.1);\n\n  tutorialState.unlocked = _savedUnlocked;\n\n  const lo = computeYn({ m_struct: 0.05, z_struct: 0.10 });\n  const hi = computeYn({ m_struct: 0.10, z_struct: 0.10 });\n  assert('Higher m → lower Y_n', hi < lo);\n\n  console.log(`[SELF-TEST] ${results.filter(r => r.pass).length}/${results.length} passed`);\n})();\n\n<\u002Fscript>\n\n\n\n\n\n\n<style id=\"__om-edit-overrides\">\n#eq-ismp >[data-term=\"C\"] >.eq-ref { text-align: right !important }\n#eq-ismp >[data-term=\"I\"] >.eq-ref { text-align: justify !important }\n#eq-ismp >[data-term=\"I\"] >.eq-ref { text-align: right !important }\n#eq-ismp >[data-term=\"I\"] >.eq-ref { text-align: center !important }\n#eq-ismp >[data-term=\"I\"] >.eq-ref { text-align: right !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
  </script>
